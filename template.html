  https://agentmole.dev —— 你的 AI Agent 协作史，本地挖掘，自愿分享。

  给逐行审查者的说明（信任面声明）：
  1. 本文件完全自包含：无 CDN、无外链字体/JS/CSS，file:// 下直接可用。
  2. 全部数据来自页内 #agentmole-data JSON 块（由 skill 在本地注入，
     注入前已完成脱敏；注入时建议把 "<" 转义为 "\u003c"）。
  3. 全文件仅有三个可能的出网动作，全部集中声明在下方同一个
     script 块里，且都只能由用户的明确点击触发：
       a) 发布：POST AGENTMOLE_PUBLISH_ENDPOINT

       b) 排名对比：GET AGENTMOLE_PERCENTILE_ENDPOINT（与发布同源）

       c) 原型分布：GET AGENTMOLE_ARCHETYPE_STATS_ENDPOINT（与发布同源）
          ——与 b) 属同一次点击授权、随其一并发出，不带任何参数，
          只为展示「你是全网 X% 的『原型』」身份行。
     除此之外没有任何 fetch / XHR / beacon / 外链资源。
     （发布成功后的「发到 X」是普通链接，点击才跳转、不自动发起请求。）
  4. 所有动态内容一律经 textContent / createElement 注入，
     不做 innerHTML 字符串拼接——数据再脏也不会变成脚本。
============================================================ -->

<script>
/* ============================================================
 * ★★★ 全文件仅有的三个出网点（ALL NETWORK ENDPOINTS LIVE HERE）★★★
 *
 * 1) 发布（POST AGENTMOLE_PUBLISH_ENDPOINT）
 *    仅在用户点击「分享」→ 发布对话框里点「确认发布」后，
 *    publishReport() 把当前页面原样 POST 到这个地址
 *    （WYSIWYG：所见即所传，不多传一个字节）。
 *
 * 2) 排名对比（GET AGENTMOLE_PERCENTILE_ENDPOINT，与发布同源）
 *    仅在用户点击「和全网鼹鼠比比」后，comparePercentiles() 对
 *    每个榜单轴发一次 GET，query 只有 axis（枚举）和 value（数字）
 *    两个参数——即本页 stats 里的 5 个统计数字，不含任何文本内容。
 *    响应 {"total","beaten","pct"}；样本不足时 {"insufficient","total"}。
 *
 * 3) 原型分布（GET AGENTMOLE_ARCHETYPE_STATS_ENDPOINT，与发布同源）
 *    与 2) 属同一次点击授权：排名正常返回后追加一次、无参数、
 *    零上传，只读全网原型分布渲染「你是全网 X% 的『原型』」。
 *
 * AGENTMOLE_API_ORIGIN 只用于拼出上面 2) 3) 两个 GET 端点；
 * 全文件其余部分不含任何网络请求代码。
 * ============================================================ */
const AGENTMOLE_PUBLISH_ENDPOINT = "https://agentmole.dev/api/publish";
const AGENTMOLE_API_ORIGIN = new URL(AGENTMOLE_PUBLISH_ENDPOINT).origin;
const AGENTMOLE_PERCENTILE_ENDPOINT = AGENTMOLE_API_ORIGIN + "/api/percentile";
const AGENTMOLE_ARCHETYPE_STATS_ENDPOINT = AGENTMOLE_API_ORIGIN + "/api/archetype-stats";
</script>
<style>
/* ============================================================
   §CSS 0 · 主题变量：Neo-brutalism（奶油底 + 蓝紫撞色 + 黑框硬投影）
   单一主题。applyTheme()（见 §JS 14）会把 docs/themes.json 里
   brutalist 的 8 个键（--bg/--card/--ink/--dim/--acc/--font/
   --radius/--border）映射派生后覆写到 :root；这里的默认值即
   brutalist 本体，保证 JS 未跑 / 失败时视觉不变、无深浅闪烁。
============================================================ */
:root {
  --bg: #f5efe3;          /* 奶油纸底 */
  --bg-soft: #faf7f1;
  --card: #ffffff;
  --card-2: #ececec;
  --line: #111111;        /* 纯黑框线 */
  --tx: #111111;
  --tx-dim: #4a4a4a;
  --tx-faint: #8b877f;
  --brown: #463e80;       /* 派生位（少量图表） */
  --brown-soft: #b8b3cf;
  --green: #3d24ff;       /* 蓝紫强调（brutalist acc） */
  --green-dim: #7d6bf5;
  --green-soft: rgba(61, 36, 255, .12);
  --pink: #ef9db0;        /* 鼠鼻（吉祥物） */
  --yellow: #ffd23f;      /* 撞色黄（横幅 / 强调） */
  --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  /* —— 以下为主题 8 键直通/派生位（默认值 = brutalist 原样） —— */
  --font: Arial, "Helvetica Neue", "PingFang SC",
    "Hiragino Sans GB", "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", sans-serif;
  --radius: 0px;
  --card-border: 3px solid #111111;
  --topbar-bg: rgba(245, 239, 227, .92);
  --banner-a: #111111; --banner-b: #111111;       /* 裂变横幅：黑色色块 */
  --arch-a: #faf7f1; --arch-b: #f0eadd;           /* 原型卡渐变两端 */
  --arch-line: rgba(61, 36, 255, .22);
  --green-line: rgba(61, 36, 255, .3);
  --brown-line: rgba(17, 17, 17, .5);
  --btn-hover: #eee7d7;
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0; background: var(--bg); color: var(--tx);
  font-family: var(--font);
  line-height: 1.6; -webkit-font-smoothing: antialiased;
}
.wrap { max-width: 940px; margin: 0 auto; padding: 0 20px; }
a { color: var(--green); }
button { font-family: inherit; }
[hidden] { display: none !important; }

/* ============================================================
   §CSS 1 · 顶部裂变横幅 + 吸顶栏（含分享按钮）
============================================================ */
.viral-banner {
  background: linear-gradient(90deg, var(--banner-a), var(--banner-b));
  border-bottom: 1px solid var(--line);
  padding: 9px 16px; text-align: center; font-size: 13.5px; color: var(--tx-dim);
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center;
}
.viral-banner code {
  font-family: var(--mono); font-size: 12.5px; color: var(--green);
  background: rgba(0,0,0,.35); border: 1px solid var(--line);
  border-radius: 6px; padding: 2px 8px;
}
.viral-cta { color: var(--tx); font-weight: 700; }
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--topbar-bg); backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
}
.topbar-in {
  max-width: 940px; margin: 0 auto; padding: 8px 20px;
  display: flex; align-items: center; gap: 10px;
}
/* 品牌 lockup：颜色写死（黄底黑框硬投影），不吃主题变量——一眼可识别的 brutalist 贴纸 */
.brand {
  display: flex; align-items: center; gap: 7px; font-weight: 900; letter-spacing: .2px;
  background: #ffd23f; color: #111; padding: 3px 12px 3px 8px; border-radius: 0;
  border: 2px solid #111; font-size: 14px; text-transform: uppercase;
  box-shadow: 3px 3px 0 0 #111;
  font-family: Arial, "Helvetica Neue", "PingFang SC", sans-serif;
}
.brand small { color: #333; font-weight: 700; font-size: 10.5px; text-transform: none; }
/* 右下角固定水印 lockup：同样写死配色；pointer-events 关掉，纯识别用 */
.brand-watermark {
  position: fixed; right: 12px; bottom: 10px; z-index: 40; pointer-events: none;
  display: flex; align-items: center; gap: 6px; opacity: .96;
  background: #ffd23f; color: #111; border: 2px solid #111; border-radius: 0;
  padding: 3px 11px 3px 7px; text-transform: uppercase;
  font-weight: 900; font-size: 11px; letter-spacing: .3px;
  font-family: Arial, "Helvetica Neue", "PingFang SC", sans-serif;
  box-shadow: 3px 3px 0 0 #111;
}
.topbar-spacer { flex: 1; }
.share-note { font-size: 11.5px; color: var(--tx-dim); }
.btn {
  cursor: pointer; border-radius: min(var(--radius), 8px); border: 1px solid var(--line);
  background: var(--card-2); color: var(--tx); padding: 6px 14px; font-size: 13.5px;
  transition: transform .08s ease, background .15s ease, filter .15s ease;
  text-decoration: none; display: inline-block;
}
.btn:hover { background: var(--btn-hover); }
.btn:active { transform: scale(.97); }
.btn-primary {
  background: var(--green); color: var(--card); font-weight: 800; border-color: transparent;
}
.btn-primary:hover { background: var(--green); filter: brightness(1.1); }
.btn-copy { font-size: 12px; padding: 3px 10px; }
a.btn { color: var(--tx); }

/* ============================================================
   §CSS 2 · 页头：紧凑单行头（小吉祥物 40px 内联 + 标题 + meta 同行）
   v3.2：原大页头压扁——首屏纵向空间让给原型名与关键数字带
============================================================ */
.hero { padding: 18px 0 0; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.hero .mascot { flex: 0 0 auto; width: 40px; height: 40px; filter: drop-shadow(0 3px 8px rgba(0,0,0,.45)); }
.hero-txt { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 4px 16px; flex-wrap: wrap; }
.hero-txt h1 { margin: 0; font-size: clamp(20px, 2.8vw, 26px); line-height: 1.25; letter-spacing: .4px; }
.hero-txt h1 em { font-style: normal; color: var(--green); }
.hero-sub { color: var(--tx-dim); font-size: 12.5px; margin-top: 0; display: flex; flex-wrap: wrap; gap: 5px 12px; align-items: center; }
.chip {
  display: inline-block; font-size: 11.5px; padding: 1px 9px; border-radius: 999px;
  border: 1px solid var(--line); background: var(--card); color: var(--tx-dim);
}
.placeholder-note {
  margin: 48px 0; padding: 22px; border: 1px dashed var(--line); border-radius: 12px;
  color: var(--tx-dim); text-align: center; font-size: 14px;
}

/* ============================================================
   §CSS 3 · 区块通用
============================================================ */
main section { margin: 54px 0; }
.sec-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 18px; }
.sec-head h2 { margin: 0; font-size: 22px; letter-spacing: .5px; }
.sec-head .en {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 2.5px;
  color: var(--tx-faint); text-transform: uppercase;
}
.card {
  background: var(--card); border: var(--card-border);
  border-radius: var(--radius); padding: 20px 22px;
}
.muted { color: var(--tx-dim); }
.faint { color: var(--tx-faint); }
svg.chart { width: 100%; height: auto; display: block; }
svg text { font-family: var(--mono); }
/* 界面语言 en（data.lang，§JS 1c）：h2 已是英文时隐藏冗余小注；引号换西文 */
[data-lang="en"] .sec-head .en { display: none; }
[data-lang="en"] .quote-text::before { content: "\201c"; }
[data-lang="en"] .quote-text::after { content: "\201d"; }

/* ============================================================
   §CSS 4 · 人格原型
============================================================ */
.arch-card { /* v3.2 瘦身：雷达缩到固定 264px 贴右，卡片整体变矮 */
  display: grid; grid-template-columns: 1fr 264px; gap: 18px; align-items: center;
  background: linear-gradient(135deg, var(--arch-a) 0%, var(--arch-b) 100%);
  border: 1px solid var(--arch-line); border-radius: calc(var(--radius) + 4px); padding: 22px 26px;
  position: relative; overflow: hidden;
}
#arch-radar { width: 100%; max-width: 264px; margin-left: auto; }
#arch-radar svg { overflow: visible; } /* 轴标签允许溢出 viewBox（en 长标签不裁切） */
.arch-card::after { /* 背景里若隐若现的洞 */
  content: ""; position: absolute; right: -70px; bottom: -90px; width: 260px; height: 260px;
  border-radius: 50%; background: radial-gradient(circle, rgba(141,255,90,.10), transparent 65%);
}
.arch-kicker { font-size: 12px; letter-spacing: 3px; color: var(--green-dim); font-family: var(--mono); }
/* 可选形象图（data.portrait，data: URI；由用户自己的 agent 本地生成，如 Codex 内置画图） */
.arch-portrait { width: 128px; height: 128px; border-radius: 18px; object-fit: cover;
  float: right; margin: 0 0 10px 14px; border: 2px solid var(--arch-line); }
.arch-name { font-size: clamp(30px, 5vw, 46px); font-weight: 900; line-height: 1.12; margin: 5px 0 2px; color: var(--green); }
.arch-en { font-family: var(--mono); color: var(--tx-dim); font-size: 14px; }
.arch-tagline { margin-top: 12px; font-size: 16px; color: var(--tx); }
@media (max-width: 720px) {
  .arch-card { grid-template-columns: 1fr; }
  #arch-radar { margin: 0 auto; max-width: 300px; } /* 移动端雷达加大居中（v3.2） */
}
/* 首屏紧凑：页头 → 原型卡 → 关键数字带 三段收拢（桌面 900px 高进首屏） */
#sec-archetype { margin: 20px 0 16px; }
#sec-keyline { margin-top: 16px; }

/* ============================================================
   §CSS 5 · 金句 + Roast
============================================================ */
.quote-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 720px) { .quote-grid { grid-template-columns: 1fr; } }
.quote-label { font-size: 12px; letter-spacing: 2px; color: var(--tx-faint); font-family: var(--mono); margin-bottom: 10px; }
.quote-text { font-size: 21px; font-weight: 700; line-height: 1.5; }
.quote-text::before { content: "「"; color: var(--brown); }
.quote-text::after { content: "」"; color: var(--brown); }
.quote-meta { margin-top: 12px; font-size: 12.5px; color: var(--tx-dim); }
.roast-card { border-color: var(--brown-line); }
.roast-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.roast-body { font-size: 15px; color: var(--tx); background: var(--bg-soft); border-radius: 4px 14px 14px 14px; padding: 14px 16px; border: 1px solid var(--line); }

/* ============================================================
   §CSS 5b · v3 创作区块：协作解读 / 年度名场面 / 隐性问题诊断
============================================================ */
/* narrative——整份报告的灵魂段落：纯排版、不做卡片，正文大一号 */
.narrative-wrap { max-width: 780px; padding: 4px 0 4px 26px; border-left: 3px solid var(--green); }
.narrative-wrap p { margin: 0 0 1.35em; font-size: 16.5px; line-height: 2; color: var(--tx); }
.narrative-wrap p:last-of-type { margin-bottom: 0; }
.narrative-wrap p.lead { font-size: clamp(19px, 2.8vw, 22px); line-height: 1.85; font-weight: 600; }
.narrative-by { display: flex; align-items: center; gap: 8px; margin-top: 18px; font-family: var(--mono); font-size: 12px; color: var(--tx-faint); }
/* moments——竖向时间线 */
.moment-list { position: relative; padding-left: 30px; }
.moment-list::before { content: ""; position: absolute; left: 9px; top: 8px; bottom: 8px; width: 2px; background: var(--line); }
.moment { position: relative; padding-bottom: 28px; }
.moment:last-child { padding-bottom: 4px; }
.moment::before { content: ""; position: absolute; left: -26px; top: 6px; width: 10px; height: 10px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 3px var(--green-soft); }
.moment-ts { font-family: var(--mono); font-size: 11.5px; letter-spacing: 1px; color: var(--tx-faint); }
.moment-title { font-size: 17.5px; font-weight: 800; margin: 3px 0 6px; }
.moment-text { font-size: 14.5px; color: var(--tx-dim); max-width: 720px; }
blockquote.moment-quote, blockquote.diag-ev, blockquote.rec-ev {
  margin: 10px 0 0; padding: 10px 15px; max-width: 720px;
  font-size: 14.5px; color: var(--tx); background: var(--bg-soft);
  border: 1px solid var(--line); border-left: 3px solid var(--brown);
  border-radius: 0 10px 10px 0;
}
/* diagnosis——体检报告异常项 */
.diag-list { display: grid; gap: 14px; }
.diag-item { border-left: 4px solid var(--brown); }
.diag-flag {
  display: inline-block; font-family: var(--mono); font-size: 10.5px; letter-spacing: 2px;
  color: var(--brown); border: 1px solid var(--brown-line); border-radius: 5px; padding: 1px 8px;
}
.diag-issue { font-size: 17px; font-weight: 800; margin: 8px 0 2px; }
.diag-row { display: flex; gap: 10px; margin-top: 9px; font-size: 13.5px; align-items: baseline; }
.diag-row .k { flex: 0 0 auto; font-family: var(--mono); font-size: 10.5px; letter-spacing: 1.5px; color: var(--tx-faint); border: 1px solid var(--line); border-radius: 4px; padding: 1px 7px; }
.diag-row .v { color: var(--tx-dim); }
.diag-row.fix .k { color: var(--green); border-color: var(--green-line); }
.diag-row.fix .v { color: var(--tx); }

/* ============================================================
   §CSS 5c · v3.1 关键数字带（keyline）+「我猜猜你是谁」（persona）
============================================================ */
/* keyline——横排大数字药丸 */
.keyline-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(168px, 1fr)); gap: 10px; }
.keyline-pill { background: var(--card); border: var(--card-border); border-radius: var(--radius); border-top: 3px solid var(--green-line); padding: 12px 15px 10px; min-width: 0; }
.kl-value { font-family: var(--mono); font-weight: 800; font-size: clamp(24px, 4.6vw, 34px); line-height: 1.15; color: var(--green); white-space: nowrap; font-variant-numeric: tabular-nums; }
/* 长数值（如 $53,799）不折行，整体缩号 */
.kl-value.long { font-size: clamp(19px, 3.4vw, 26px); }
.kl-label { font-size: 12px; color: var(--tx-dim); margin-top: 2px; }
.kl-quip { font-size: 11px; color: var(--tx-faint); margin-top: 4px; }
/* persona——侦探结案报告 */
.pg-kicker { font-family: var(--mono); font-size: 11px; letter-spacing: 3px; color: var(--brown); border-bottom: 1px dashed var(--brown-line); padding-bottom: 8px; margin-bottom: 14px; }
.persona-figure { float: left; margin: 4px 20px 10px 0; width: min(200px, 42%); }
.persona-figure img { display: block; width: 100%; border-radius: 10px; border: 2px solid var(--brown-line); transform: rotate(-2deg); box-shadow: 0 8px 22px rgba(0, 0, 0, .35); }
.pg { padding: 10px 0; border-bottom: 1px dashed var(--line); }
.pg:last-of-type { border-bottom: 0; }
.pg-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.pg-no { font-family: var(--mono); color: var(--brown); font-weight: 800; font-size: 13px; }
.pg-text { font-size: 18px; font-weight: 800; flex: 1; min-width: 55%; }
.pg-conf { flex: 0 0 auto; font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; border: 1px solid var(--line); color: var(--tx-dim); border-radius: 5px; padding: 2px 8px; white-space: nowrap; }
.pg-conf.high { color: var(--green); border-color: var(--green-line); background: var(--green-soft); }
.pg-conf.medium { color: var(--brown); border-color: var(--brown-line); }
.pg-conf.low { color: var(--tx-faint); border-style: dashed; }
.pg-why { font-size: 13px; color: var(--tx-dim); margin-top: 4px; }
.persona-note { clear: both; margin-top: 14px; font-size: 11.5px; color: var(--tx-faint); }

/* ============================================================
   §CSS 5d · v3.2 下一步建议（recommendations）——顾问式优先级行动清单
   每张卡：序号 + 标题 + 收益 chip · 依据(why) · 证据引用 · action 高亮块。
   action 是主角：accent 左描边 + 荧光绿底，比其余内容重一档。
============================================================ */
.rec-list { display: grid; gap: 16px; }
.rec-item { display: grid; grid-template-columns: auto 1fr; gap: 2px 20px; align-items: start; }
.rec-rank { font-family: var(--mono); font-weight: 800; line-height: 1; color: var(--green);
  font-size: clamp(26px, 4.4vw, 36px); font-variant-numeric: tabular-nums; }
.rec-main { min-width: 0; }
.rec-head { display: flex; align-items: baseline; gap: 8px 14px; flex-wrap: wrap; }
.rec-title { font-size: 18.5px; font-weight: 800; flex: 1; min-width: 55%; line-height: 1.3; }
.rec-impact { flex: 0 0 auto; max-width: 100%; display: inline-flex; align-items: baseline; gap: 7px;
  font-size: 12.5px; color: var(--brown); background: rgba(176, 125, 79, .12);
  border: 1px solid var(--brown-line); border-radius: 999px; padding: 3px 12px; }
.rec-impact .k { font-family: var(--mono); font-size: 9.5px; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--brown-soft); }
.rec-rationale { margin: 8px 0 0; font-size: 14px; color: var(--tx-dim); max-width: 720px; }
.rec-ev .k { display: block; font-family: var(--mono); font-size: 9.5px; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--tx-faint); margin-bottom: 4px; }
.rec-action { margin-top: 14px; padding: 13px 17px 15px; max-width: 760px;
  background: var(--green-soft); border: 1px solid var(--green-line);
  border-left: 4px solid var(--green); border-radius: 0 12px 12px 12px; }
.rec-action .k { display: block; font-family: var(--mono); font-size: 10.5px; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--green); margin-bottom: 6px; }
.rec-action .rec-action-text { font-size: 15.5px; font-weight: 600; line-height: 1.6; color: var(--tx); }
/* 一键喂给 agent：全部建议 + skill 打包 */
.rec-feed { margin-top: 18px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.rec-feed .btn { font-size: 14px; padding: 9px 18px; }
.rec-feed-note { font-size: 12.5px; color: var(--tx-faint); }
@media (max-width: 720px) {
  .rec-item { grid-template-columns: 1fr; gap: 6px; }
  .rec-rank { font-size: 22px; }
  .rec-feed .btn { width: 100%; }
}

/* ============================================================
   §CSS 6 · 硬核数字
============================================================ */
.stat-hero { text-align: center; padding: 34px 22px; }
.stat-hero .n {
  font-family: var(--mono); font-weight: 800; color: var(--green);
  font-size: clamp(52px, 11vw, 96px); line-height: 1.05; letter-spacing: -2px;
  text-shadow: 0 0 34px rgba(141,255,90,.25);
}
.stat-hero .n small { font-size: .38em; letter-spacing: 0; color: var(--green-dim); }
.stat-hero .label { color: var(--tx-dim); font-size: 14px; margin-top: 6px; }
.stat-hero .convert { margin-top: 14px; font-size: 16.5px; color: var(--tx); }
.stat-hero .convert b { color: var(--brown); font-size: 1.25em; }
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 14px; }
@media (max-width: 720px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }
.stat-cell .n { font-family: var(--mono); font-size: clamp(26px, 4.5vw, 38px); font-weight: 800; line-height: 1.15; }
.stat-cell .n em { font-style: normal; font-size: .5em; color: var(--tx-dim); }
.stat-cell .cn { font-size: 13.5px; margin-top: 3px; }
.stat-cell .en { font-family: var(--mono); font-size: 9.5px; letter-spacing: 2px; color: var(--tx-faint); text-transform: uppercase; }
.stat-cell .hint { font-size: 12px; color: var(--tx-dim); margin-top: 5px; }
/* 「估算」角标：主显外推估算值时挂在大数字旁 */
.est-badge {
  display: inline-block; vertical-align: super; margin-left: 8px;
  font-size: 11px; font-weight: 700; letter-spacing: 1px; font-family: var(--mono);
  color: var(--brown); border: 1px solid var(--brown-line); border-radius: 5px; padding: 1px 7px;
}
.est-measured { margin-top: 8px; font-size: 12px; color: var(--tx-faint); font-family: var(--mono); }
/* token 区常驻口径小字（契约 v3：无论有无估算值都展示） */
.token-note { margin-top: 12px; font-size: 11.5px; color: var(--tx-faint); }
/* v3 · 等值 API 成本大卡：棕色区分 token 绿，语气戏谑但数字认真 */
.cost-hero { margin-top: 14px; padding: 26px 22px; }
.cost-hero .n { color: var(--brown); font-size: clamp(42px, 9vw, 78px); text-shadow: none; }
.cost-hero .n small { color: var(--brown-soft); }
.cost-note { margin-top: 10px; font-size: 12.5px; color: var(--tx-dim); }
/* v3 · 戏谑换算带：一排小徽章，别喧宾夺主 */
.fun-strip { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
.fun-chip {
  display: flex; flex-direction: column; gap: 1px; padding: 7px 12px;
  background: var(--card); border: var(--card-border); border-radius: min(var(--radius), 10px);
}
.fun-chip b { font-size: 13.5px; font-weight: 700; color: var(--tx); }
.fun-chip small { font-size: 10.5px; color: var(--tx-faint); font-family: var(--mono); }
/* v3 · 用途分布条：单条横向堆叠 + 图例 */
.usage-card { margin-top: 14px; }
.usage-bar { display: flex; height: 22px; border-radius: min(var(--radius), 8px); overflow: hidden; border: 1px solid var(--line); }
.usage-bar i { display: block; height: 100%; }
.usage-legend { display: flex; flex-wrap: wrap; gap: 6px 16px; margin-top: 10px; font-size: 12.5px; color: var(--tx-dim); }
.usage-legend i { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 6px; }
/* v3.1 · 模型座次 + effort 档位（分别复用 .sig-* 条形与 .chip 药丸骨架） */
.model-row .sig-text { font-family: var(--mono); font-size: 13px; font-weight: 600; overflow-wrap: anywhere; }
.effort-strip { display: flex; flex-wrap: wrap; gap: 8px; }
.effort-badge { font-family: var(--mono); padding: 4px 12px; }
.effort-badge b { color: var(--tx); }
.effort-badge.top { color: var(--green); border-color: var(--green-line); background: var(--green-soft); }
/* 通用纯 CSS tooltip：hover 展示 data-tip 内容（零依赖） */
.tip { position: relative; cursor: help; }
.tip:hover::after {
  content: attr(data-tip); position: absolute; left: 50%; bottom: calc(100% + 8px);
  transform: translateX(-50%); z-index: 60;
  width: max-content; max-width: 280px; white-space: normal; text-align: left;
  background: var(--card-2); color: var(--tx); border: 1px solid var(--line);
  font-size: 12px; font-weight: 400; font-family: var(--font); letter-spacing: 0; line-height: 1.5;
  padding: 8px 11px; border-radius: 8px; box-shadow: 0 8px 24px rgba(0, 0, 0, .4);
}
/* 「和全网鼹鼠比比」对比块（数据只在点击后才发出，见 §JS 5b） */
.pct-block { margin-top: 14px; }
.pct-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.pct-note { font-size: 11.5px; color: var(--tx-faint); }
.pct-list { margin-top: 12px; display: grid; gap: 6px; }
.pct-row { font-size: 14.5px; }
.pct-row b { color: var(--green); font-family: var(--mono); font-size: 1.15em; }
.pct-row .axis { color: var(--tx-dim); }
.pct-fail { color: var(--tx-dim); font-size: 13.5px; }
/* v3.2 · MBTI 式身份行：「你是全网 X% 的『原型』」（数据来自 archetype-stats） */
.pct-identity {
  margin: 2px 0 10px; padding: 12px 16px; font-size: 14.5px; color: var(--tx);
  border: 1px solid var(--green-line); background: var(--green-soft);
  border-radius: min(var(--radius), 10px);
}
.pct-identity b { color: var(--green); font-family: var(--mono); font-size: 1.6em; }
.pct-identity .arch { font-weight: 800; font-size: 1.2em; }
/* 对比结果区常驻口径小字 */
.pct-scope { margin-top: 10px; font-size: 11px; color: var(--tx-faint); }

/* ============================================================
   §CSS 7 · 词云 + 口头禅榜
============================================================ */
.words-grid { display: grid; grid-template-columns: 1.25fr .75fr; gap: 16px; align-items: start; }
@media (max-width: 720px) { .words-grid { grid-template-columns: 1fr; } }
.cloud { display: flex; flex-wrap: wrap; gap: 6px 14px; align-items: center; justify-content: center; padding: 26px 14px; }
.cloud span { line-height: 1.1; white-space: nowrap; cursor: default; }
.sig-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px dashed var(--line); }
.sig-row:last-child { border-bottom: 0; }
.sig-rank { font-family: var(--mono); color: var(--tx-faint); font-size: 12px; width: 22px; }
.sig-text { flex: 1; font-weight: 600; font-size: 14.5px; }
.sig-bar-wrap { flex: 0 0 72px; height: 6px; border-radius: 3px; background: var(--bg-soft); overflow: hidden; }
.sig-bar { height: 100%; background: linear-gradient(90deg, var(--green-dim), var(--green)); }
.sig-count { font-family: var(--mono); color: var(--green); font-size: 13px; min-width: 48px; text-align: right; }

/* ============================================================
   §CSS 8 · 图表区（磨合曲线 / 作息）
============================================================ */
.legend { display: flex; gap: 18px; font-size: 12px; color: var(--tx-dim); margin-bottom: 8px; flex-wrap: wrap; }
.legend i { display: inline-block; width: 18px; height: 3px; border-radius: 2px; vertical-align: middle; margin-right: 6px; }
.heat-scroll { overflow-x: auto; padding-bottom: 6px; position: relative; /* 兼作 tooltip 定位容器 */ }
.heat-legend { display: flex; align-items: center; gap: 5px; font-size: 11.5px; color: var(--tx-faint); margin-top: 8px; justify-content: flex-end; }
.heat-legend i { width: 11px; height: 11px; border-radius: 2.5px; display: inline-block; }
/* GitHub 化热力格：hover 放大高亮 + 自绘 tooltip（纯 CSS/JS，零依赖） */
.heat-cell { transform-box: fill-box; transform-origin: center; transition: transform .08s ease; }
.heat-cell:hover { transform: scale(1.4); stroke: var(--tx); stroke-width: 1; }
.heat-tip {
  position: absolute; z-index: 20; pointer-events: none;
  background: var(--card-2); border: 1px solid var(--line); color: var(--tx);
  font-family: var(--mono); font-size: 11.5px; line-height: 1.4;
  padding: 4px 9px; border-radius: 6px; white-space: nowrap;
  box-shadow: 0 6px 18px rgba(0, 0, 0, .45);
}
.chart-title { font-size: 13.5px; color: var(--tx-dim); margin: 20px 0 6px; }
.chart-title:first-child { margin-top: 0; }

/* ============================================================
   §CSS 8b · per-source 对比区（Claude 橙 vs Codex 青，阵营配色写死）
============================================================ */
.src-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: stretch; }
@media (max-width: 720px) { .src-grid { grid-template-columns: 1fr; } }
.src-card { border-top: 3px solid var(--src-color, var(--green)); }
.src-name { font-weight: 800; font-size: 16px; color: var(--src-color, var(--tx)); display: flex; align-items: center; gap: 8px; }
.src-name i { width: 9px; height: 9px; border-radius: 50%; background: var(--src-color); display: inline-block; }
.src-big { font-family: var(--mono); font-weight: 800; font-size: clamp(28px, 5vw, 40px); line-height: 1.15; margin-top: 8px; }
.src-big em { font-style: normal; font-size: .45em; color: var(--tx-dim); }
.src-share-track { height: 8px; border-radius: 4px; background: var(--bg-soft); overflow: hidden; margin: 10px 0 4px; }
.src-share-bar { height: 100%; border-radius: 4px; background: var(--src-color); }
.src-share-label { font-size: 12px; color: var(--tx-dim); font-family: var(--mono); }
.src-facts { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; font-size: 12.5px; color: var(--tx-dim); }
.src-facts b { color: var(--tx); font-family: var(--mono); font-weight: 700; }
.src-roast {
  margin-top: 14px; font-size: 13.5px; color: var(--tx);
  background: var(--bg-soft); border: 1px solid var(--line);
  border-left: 3px solid var(--src-color); border-radius: 4px 12px 12px 12px; padding: 10px 13px;
}
.src-roast .who { font-size: 11px; letter-spacing: 1.5px; color: var(--tx-faint); font-family: var(--mono); display: block; margin-bottom: 4px; }

/* ============================================================
   §CSS 9 · 徽章 / 信条 / skill 蒸馏
============================================================ */
.badge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
.badge { display: flex; gap: 13px; align-items: flex-start; }
.badge-ico {
  flex: 0 0 44px; width: 44px; height: 44px; border-radius: min(var(--radius), 12px);
  background: var(--green-soft); border: 1px solid var(--green-line);
  display: flex; align-items: center; justify-content: center; color: var(--green);
}
.badge-name { font-weight: 800; font-size: 15.5px; }
.badge-desc { font-size: 13px; color: var(--tx-dim); }
.badge-ev { font-size: 12px; color: var(--tx-faint); margin-top: 4px; font-family: var(--mono); }
.creed-list { display: grid; gap: 12px; counter-reset: creed; }
.creed { display: flex; gap: 16px; }
.creed-no { font-family: var(--mono); color: var(--green-dim); font-weight: 800; font-size: 20px; min-width: 34px; padding-top: 2px; }
.creed-text { font-size: 17.5px; font-weight: 700; }
.creed-ev { margin: 6px 0 0; font-size: 13px; color: var(--tx-dim); border-left: 2px solid var(--brown-soft); padding-left: 10px; }
.creed-ev .ts { color: var(--tx-faint); font-family: var(--mono); font-size: 11.5px; margin-left: 8px; }
.skill-card { margin-bottom: 14px; }
.skill-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.skill-kind {
  font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; padding: 2px 8px;
  border-radius: 4px; background: var(--green-soft); color: var(--green); border: 1px solid var(--green-line);
}
.skill-kind.patch { background: rgba(176,125,79,.15); color: var(--brown); border-color: rgba(176,125,79,.4); }
.skill-title { font-family: var(--mono); font-weight: 700; font-size: 16px; flex: 1; }
.skill-seen {
  font-family: var(--mono); font-size: 12px; font-weight: 700; white-space: nowrap; cursor: help;
  color: var(--green); background: var(--green-soft); border: 1px solid var(--green-line);
  border-radius: 4px; padding: 2px 8px;
}
.skill-trigger { font-size: 13px; color: var(--tx-dim); margin: 8px 0 10px; }
.skill-body {
  font-family: var(--mono); font-size: 12px; line-height: 1.55; color: var(--tx-dim);
  background: var(--bg-soft); border: 1px solid var(--line); border-radius: 10px;
  padding: 14px; max-height: 240px; overflow: auto; white-space: pre-wrap; margin: 0;
}

/* ============================================================
   §CSS 10 · 发布弹窗 + 页脚
============================================================ */
.modal-mask {
  position: fixed; inset: 0; z-index: 100; background: rgba(8, 6, 4, .72);
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal {
  width: min(480px, 100%); background: var(--card-2); border: var(--card-border);
  border-radius: calc(var(--radius) + 2px); padding: 26px; box-shadow: 0 24px 80px rgba(0,0,0,.6);
}
.modal h3 { margin: 0 0 10px; font-size: 18px; }
/* 发布确认对话框的表单件 */
.pub-field { margin: 16px 0 4px; }
.pub-field label { display: block; font-size: 12.5px; color: var(--tx-dim); margin-bottom: 6px; }
.pub-field input[type="text"] {
  width: 100%; padding: 8px 12px; font-size: 14px; font-family: inherit;
  background: var(--bg-soft); color: var(--tx); border: 1px solid var(--line);
  border-radius: min(var(--radius), 8px); outline: none;
}
.pub-field input[type="text"]:focus { border-color: var(--green-line); }
.pub-check { display: flex; gap: 9px; align-items: flex-start; margin: 14px 0 2px; font-size: 13.5px; cursor: pointer; }
.pub-check input { margin-top: 3px; accent-color: var(--green); }
.pub-check .sub { display: block; font-size: 11.5px; color: var(--tx-faint); }
.pub-wysiwyg {
  margin: 14px 0 0; padding: 10px 13px; font-size: 12.5px; color: var(--tx-dim);
  background: var(--bg-soft); border: 1px dashed var(--line); border-radius: min(var(--radius), 8px);
}
.pub-edit-note { margin: 9px 2px 0; font-size: 12px; color: var(--tx-faint); }
.pub-edit-note::before { content: "✎ "; color: var(--brown); }
.pub-url {
  display: flex; gap: 8px; align-items: center; margin: 14px 0;
  background: var(--bg-soft); border: 1px solid var(--line); border-radius: 8px; padding: 9px 12px;
}
.pub-url code { flex: 1; font-family: var(--mono); font-size: 13px; color: var(--green); word-break: break-all; }
.modal-row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
.spin {
  width: 22px; height: 22px; border-radius: 50%; display: inline-block; vertical-align: middle;
  border: 3px solid var(--line); border-top-color: var(--green); animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
footer {
  margin-top: 70px; padding: 30px 0 46px; border-top: 1px solid var(--line);
  font-size: 12.5px; color: var(--tx-faint); text-align: center;
}
footer .trust { color: var(--tx-dim); margin-top: 6px; }

/* ============================================================
   §CSS 11 · 主题骨相（theme skeletons）
   applyTheme()（§JS 14）套用变量成功后会在 <html> 上写
   data-theme="<key>"；本区按主题叠加各自的标志性设计语言
   （结构 / 阴影 / 交互），纯 CSS、零外链、零 JS 逻辑。
   风格依据：docs/themes.json 各主题 prompt（构建时被剥离，不进模板）。
   品牌 lockup（.brand / .brand-watermark）与阵营色写死，不吃这些规则。
   浅色三主题（academia/clay/swiss）本期无骨相，仅换变量。
============================================================ */

/* —— 共用：terminal / brutalist 属硬边语言，把硬编码圆角一律拉直 —— */
:is([data-theme="terminal"], [data-theme="brutalist"]) :is(.chip, .viral-banner code,
  .placeholder-note, .arch-portrait, .est-badge, .sig-bar-wrap, .sig-bar, .roast-body,
  .src-roast, .src-share-track, .src-share-bar, .skill-kind, .skill-body, .pub-url,
  .pub-wysiwyg, .heat-tip, .moment-quote, .diag-ev, .diag-flag, .diag-row .k,
  .fun-chip, .usage-bar, .usage-legend i, .rec-ev, .rec-impact, .rec-action,
  .keyline-pill, .pg-conf, .persona-figure img) { border-radius: 0; }
:is([data-theme="terminal"], [data-theme="brutalist"]) .tip:hover::after { border-radius: 0; }

/* —— mole（默认）：微调——土层分割线（keyline 紧贴原型卡不吃线）+ 洞口小土丘 —— */
[data-theme="mole"] main > section:not(#sec-keyline) { border-top: 1px solid var(--line); padding-top: 30px; }
[data-theme="mole"] .sec-head h2::before { /* 挖掘现场的小土丘 */
  content: ""; display: inline-block; width: 13px; height: 8px; margin-right: 10px;
  background: var(--brown); border-radius: 50% 50% 2px 2px / 100% 100% 3px 3px;
}
[data-theme="mole"] .card { box-shadow: 0 1px 0 rgba(0, 0, 0, .4); } /* 地层压痕，唯一允许的"阴影" */

/* —— terminal：CRT / CLI 骨相——等宽已由 --font 全局接管，这里补窗口感与磷光 —— */
[data-theme="terminal"] body::after { /* 微弱扫描线：单层 repeating-gradient，性能友好 */
  content: ""; position: fixed; inset: 0; z-index: 999; pointer-events: none;
  background: repeating-linear-gradient(0deg, rgba(0, 0, 0, .18) 0 1px, transparent 1px 3px);
}
[data-theme="terminal"] .topbar { backdrop-filter: none; } /* CRT 没有毛玻璃 */
[data-theme="terminal"] main > section { border-top: 1px dashed var(--line); padding-top: 28px; }
[data-theme="terminal"] .hero-txt h1 { text-shadow: 0 0 9px rgba(51, 255, 102, .35); }
[data-theme="terminal"] .hero-txt h1::after { /* 命令行光标 */
  content: "▌"; margin-left: 8px; color: var(--tx); animation: am-blink 1.1s step-end infinite;
}
[data-theme="terminal"] .sec-head h2 { text-shadow: 0 0 7px rgba(51, 255, 102, .3); }
[data-theme="terminal"] .sec-head h2::before { content: "$ "; color: var(--green); font-family: var(--mono); }
[data-theme="terminal"] .card { position: relative; padding-top: 36px; }
[data-theme="terminal"] .card::before { /* 终端窗口标题条：三颗暗绿圆点，纯 gradient */
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 18px;
  border-bottom: 1px solid var(--line);
  background:
    radial-gradient(circle at 11px 9px, var(--tx-faint) 2.6px, transparent 3.2px),
    radial-gradient(circle at 24px 9px, var(--tx-faint) 2.6px, transparent 3.2px),
    radial-gradient(circle at 37px 9px, var(--tx-faint) 2.6px, transparent 3.2px),
    var(--bg-soft);
}
[data-theme="terminal"] .stat-hero .n { /* 大数字回归磷光绿主导；amber 留作次级强调 */
  color: var(--tx); text-shadow: 0 0 12px rgba(51, 255, 102, .5);
}
[data-theme="terminal"] .stat-hero .n small { color: var(--tx-dim); }
[data-theme="terminal"] .btn { text-transform: uppercase; letter-spacing: 1px; }
[data-theme="terminal"] .btn::before { content: "[ "; color: var(--tx-faint); }
[data-theme="terminal"] .btn::after { content: " ]"; color: var(--tx-faint); }
[data-theme="terminal"] .btn:hover { /* 反色（inverted video），CLI 的 hover 语言 */
  background: var(--tx); color: var(--bg); border-color: var(--tx);
}
[data-theme="terminal"] .btn:hover::before, [data-theme="terminal"] .btn:hover::after { color: var(--bg); }
[data-theme="terminal"] .btn-primary:hover { background: var(--tx); filter: none; }
[data-theme="terminal"] ::selection { background: #33ff66; color: #0a0e0a; }
@keyframes am-blink { 50% { opacity: 0; } }
@media (prefers-reduced-motion: reduce) {
  [data-theme="terminal"] .hero-txt h1::after { animation: none; }
}

/* —— brutalist：Neo-Brutalism 骨相——硬偏移阴影 / 粗黑边 / 机械按压 —— */
[data-theme="brutalist"] body { /* 半调网点纸面，拒绝留白空场 */
  background-image: radial-gradient(rgba(17, 17, 17, .12) 1.2px, transparent 1.4px);
  background-size: 22px 22px;
}
[data-theme="brutalist"] .viral-banner { /* 顶部黑色色块横幅（color blocking） */
  background: #111; color: #fffdf5; font-weight: 700; border-bottom: 3px solid #111;
}
[data-theme="brutalist"] .viral-cta { color: #ffd23f; }
[data-theme="brutalist"] .viral-banner code { background: #ffd23f; color: #111; border: 2px solid #111; font-weight: 700; }
[data-theme="brutalist"] .topbar { backdrop-filter: none; background: var(--bg); border-bottom: 3px solid #111; }
[data-theme="brutalist"] .card, [data-theme="brutalist"] .arch-card, [data-theme="brutalist"] .modal {
  border: 3px solid #111; border-radius: 0; box-shadow: 6px 6px 0 #111; /* 签名式硬偏移阴影 */
}
[data-theme="brutalist"] .card { transition: transform .1s ease-out, box-shadow .1s ease-out; }
[data-theme="brutalist"] .card:hover { transform: translate(-2px, -2px); box-shadow: 9px 9px 0 #111; } /* 抬起 = 阴影变深 */
[data-theme="brutalist"] .modal { box-shadow: 12px 12px 0 #111; }
[data-theme="brutalist"] .src-card { border-top: 6px solid var(--src-color); } /* 阵营色条保留且加粗 */
[data-theme="brutalist"] .arch-card::after { display: none; } /* 软光晕不属于硬边语言 */
[data-theme="brutalist"] .hero-txt h1 { font-weight: 900; }
[data-theme="brutalist"] .hero-txt h1 em { /* 贴纸式色块高亮 */
  background: #3d24ff; color: #fffdf5; padding: 0 12px; display: inline-block; transform: rotate(-1.2deg);
}
[data-theme="brutalist"] .sec-head h2 { /* 标题更重更大：黑底黄字色块 + 紫色硬影 */
  font-size: 26px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
  background: #111; color: #ffd23f; padding: 3px 14px; transform: rotate(-.6deg);
  box-shadow: 4px 4px 0 #3d24ff;
}
[data-theme="brutalist"] .sec-head .en { color: #111; font-weight: 700; }
[data-theme="brutalist"] .btn {
  border: 2px solid #111; border-radius: 0; box-shadow: 3px 3px 0 #111;
  font-weight: 800; text-transform: uppercase; letter-spacing: .5px;
}
[data-theme="brutalist"] .btn:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 #111; background: #fffdf5; }
[data-theme="brutalist"] .btn:active { transform: translate(3px, 3px); box-shadow: 0 0 0 #111; } /* 机械按压：位移吃掉阴影 */
[data-theme="brutalist"] .btn-primary:hover { background: var(--green); color: #fffdf5; filter: none; }
[data-theme="brutalist"] .stat-hero .n { color: var(--green); text-shadow: 4px 4px 0 #111; }
[data-theme="brutalist"] .stat-hero .n small { color: #111; }
[data-theme="brutalist"] .arch-name { text-shadow: 3px 3px 0 #111; }
[data-theme="brutalist"] .chip { border: 2px solid #111; color: #111; background: #fffdf5; font-weight: 700; }
[data-theme="brutalist"] .badge-ico { background: #ffd23f; border: 2px solid #111; color: #111; }
[data-theme="brutalist"] .est-badge { border: 2px solid #111; color: #111; background: #ffd23f; transform: rotate(2deg); }
[data-theme="brutalist"] .arch-portrait { border: 2px solid #111; }
[data-theme="brutalist"] .sig-bar-wrap { background: #fffdf5; border: 2px solid #111; height: 10px; }
[data-theme="brutalist"] .sig-bar { background: #3d24ff; } /* 平涂，不用渐变 */
[data-theme="brutalist"] .src-share-track { background: #fffdf5; border: 2px solid #111; }
[data-theme="brutalist"] .roast-body, [data-theme="brutalist"] .src-roast,
[data-theme="brutalist"] .skill-body { border: 2px solid #111; background: #fffdf5; }
[data-theme="brutalist"] .src-roast { border-left: 6px solid var(--src-color); }
[data-theme="brutalist"] .skill-kind { border: 2px solid #111; }
[data-theme="brutalist"] .skill-seen { border: 2px solid #111; border-radius: 0; box-shadow: 2px 2px 0 0 #111; }
[data-theme="brutalist"] .creed-ev { border-left: 4px solid #111; }
/* v3 区块的硬边语言 */
[data-theme="brutalist"] .narrative-wrap { border-left: 6px solid #111; }
[data-theme="brutalist"] .moment-list::before { width: 3px; background: #111; }
[data-theme="brutalist"] .moment::before {
  border-radius: 0; width: 9px; height: 9px; left: -27px;
  background: var(--green); border: 2px solid #111; box-shadow: none;
}
[data-theme="brutalist"] blockquote.moment-quote, [data-theme="brutalist"] blockquote.diag-ev {
  border: 2px solid #111; border-left: 6px solid #111; background: #fffdf5;
}
[data-theme="brutalist"] .diag-item { border-left: 6px solid #111; }
[data-theme="brutalist"] .diag-flag { /* 体检异常贴纸：局部黄点缀 */
  background: #ffd23f; border: 2px solid #111; color: #111; font-weight: 700; transform: rotate(-1deg);
}
[data-theme="brutalist"] .diag-row .k { border: 2px solid #111; color: #111; }
[data-theme="brutalist"] .cost-hero .n { color: #111; text-shadow: 4px 4px 0 #ffd23f; }
[data-theme="brutalist"] .fun-chip { border: 2px solid #111; background: #fffdf5; box-shadow: 3px 3px 0 #111; }
/* v3.1 区块的硬边语言（keyline 药丸的 3px 黑边已由 var(--card-border) 直通；effort 徽章吃 .chip 规则） */
[data-theme="brutalist"] .keyline-pill { border-top-width: 6px; box-shadow: 4px 4px 0 #111; }
[data-theme="brutalist"] .persona-figure img { border-color: #111; box-shadow: 4px 4px 0 #111; }
[data-theme="brutalist"] .pg-conf { border: 2px solid #111; color: #111; background: #fffdf5; }
[data-theme="brutalist"] .pg-conf.high { background: #ffd23f; }
[data-theme="brutalist"] .usage-bar { border: 2px solid #111; }
[data-theme="brutalist"] .pub-field input[type="text"] { border: 2px solid #111; border-radius: 0; background: #fffdf5; }
[data-theme="brutalist"] .pub-field input[type="text"]:focus { background: #ffd23f; border-color: #111; box-shadow: 3px 3px 0 #111; }
[data-theme="brutalist"] .pub-url { border: 2px solid #111; background: #fffdf5; }
[data-theme="brutalist"] .pub-wysiwyg, [data-theme="brutalist"] .placeholder-note { border: 2px dashed #111; }
[data-theme="brutalist"] .heat-tip, [data-theme="brutalist"] .tip:hover::after {
  border: 2px solid #111; background: #fffdf5; color: #111; box-shadow: 4px 4px 0 #111;
}
[data-theme="brutalist"] footer { border-top: 3px solid #111; color: var(--tx-dim); }

/* ============================================================
   §CSS 12 · 移动端专项（390px 首屏构图与全局密度）
============================================================ */
@media (max-width: 480px) {
  .wrap { padding: 0 14px; }
  .viral-banner { padding: 5px 10px; font-size: 12px; gap: 5px 8px; }
  .viral-banner .viral-desc { display: none; } /* 横幅收细 */
  .viral-banner code { font-size: 11px; padding: 1px 6px; }
  .topbar-in { padding: 6px 14px; gap: 8px; }
  .brand small, .share-note { display: none; } /* 顶栏收细 */
  .hero { padding: 8px 0 0; gap: 10px; }
  .hero-txt h1 { font-size: 19px; }
  .hero-sub { font-size: 11.5px; gap: 4px 10px; }
  main section { margin: 26px 0; }
  .sec-head { margin-bottom: 12px; }
  .sec-head h2 { font-size: 19px; }
  .card { padding: 14px 15px; }
  [data-theme="mole"] main > section:not(#sec-keyline) { padding-top: 18px; }
  .arch-card { padding: 14px 16px; gap: 8px; }
  .arch-tagline { font-size: 14.5px; margin-top: 8px; }
  /* 雷达尺寸：390px 下 300px 居中（规则在 §CSS 4 的 720px 断点） */
  #sec-keyline { margin-top: 10px; }
  .keyline-strip { grid-template-columns: 1fr 1fr; gap: 8px; } /* 2 列 = 前两枚一行进首屏 */
  .keyline-pill { padding: 10px 12px 9px; }
  .kl-value { font-size: 23px; }
  .narrative-wrap { padding-left: 14px; }
  .narrative-wrap p { font-size: 15px; }
  .quote-text { font-size: 17px; }
  .moment-list { padding-left: 22px; }
  .moment::before { left: -18px; }
  .stat-hero { padding: 22px 12px; }
  .fun-strip { display: grid; grid-template-columns: 1fr 1fr; } /* 换算带对齐成 2 列 */
  #curve-chart, #hour-chart { overflow-x: auto; } /* 宽图表转横滑 */
  :is(#curve-chart, #hour-chart) svg { min-width: 470px; }
  .persona-figure { float: none; margin: 0 auto 14px; }
  .pg-text { font-size: 16px; }
  .modal-mask { padding: 0; align-items: stretch; } /* 发布对话框全屏化 */
  .modal { width: 100%; max-width: none; border-radius: 0; overflow-y: auto; }
}
</style>

<!-- ============================================================
  §DATA · 数据块：skill 在本地把真实 JSON（已脱敏）整体替换进来。
  发布 API 也从这里解析 stats 做榜单聚合（契约见 docs/data-contract.md）。
============================================================ -->
<script id="agentmole-data" type="application/json">{"schema_version":3,"placeholder":true}</script>

<script>
"use strict";
/* ============================================================
 * §JS 0 · 工具函数
 *   安全约定：所有数据经 createElement + textContent 进入 DOM，
 *   本文件不存在含数据的 innerHTML 赋值。
 * ============================================================ */
const $ = (s) => document.querySelector(s);
const SVG_NS = "http://www.w3.org/2000/svg";

/** 创建 HTML 元素：el("div", {class:"x", text:"安全注入"}, child…) */
function el(tag, attrs, ...children) {
  const n = document.createElement(tag);
  for (const k in attrs || {}) {
    if (k === "text") n.textContent = attrs[k];
    else n.setAttribute(k, attrs[k]);
  }
  for (const c of children) if (c != null) n.append(c);
  return n;
}
/** 创建 SVG 元素 */
function sv(tag, attrs, ...children) {
  const n = document.createElementNS(SVG_NS, tag);
  for (const k in attrs || {}) {
    if (k === "text") n.textContent = attrs[k];
    else n.setAttribute(k, attrs[k]);
  }
  for (const c of children) if (c != null) n.append(c);
  return n;
}
/** 千分位整数 */
const fmtInt = (n) => Math.round(n).toLocaleString("en-US");
/** 单位大数（跟随界面语言 LANG）：zh 9.8 亿 / 41.2 万；en 981M / 412K */
function fmtCN(n) {
  if (LANG === "en") {
    if (n >= 1e9) return { num: trim1(n / 1e9), unit: "B" };
    if (n >= 1e6) return { num: trim1(n / 1e6), unit: "M" };
    if (n >= 1e4) return { num: trim1(n / 1e3), unit: "K" };
    return { num: fmtInt(n), unit: "" };
  }
  if (n >= 1e8) return { num: trim1(n / 1e8), unit: "亿" };
  if (n >= 1e4) return { num: trim1(n / 1e4), unit: "万" };
  return { num: fmtInt(n), unit: "" };
}
const trim1 = (x) => (Math.round(x * 10) / 10).toLocaleString("en-US");
const pct = (x, d = 0) => (x * 100).toFixed(d) + "%";
const hasArr = (a) => Array.isArray(a) && a.length > 0;

/** 复制到剪贴板（file:// 下 Clipboard API 可能不可用，带 execCommand 兜底） */
async function copyText(txt, btn, okLabel) {
  let ok = false;
  try { await navigator.clipboard.writeText(txt); ok = true; } catch (e) { /* 走兜底 */ }
  if (!ok) {
    const ta = el("textarea", { style: "position:fixed;opacity:0" });
    ta.value = txt; document.body.append(ta); ta.select();
    try { ok = document.execCommand("copy"); } catch (e) { ok = false; }
    ta.remove();
  }
  if (btn) {
    const orig = btn.textContent;
    btn.textContent = ok ? (okLabel || TR.copied) : TR.cpFail;
    setTimeout(() => { btn.textContent = orig; }, 1600);
  }
  return ok;
}

/* ============================================================
 * §JS 0b · 调色板 PAL：SVG 图表使用的具体色值。
 *   默认值与 §CSS 0 的 :root 完全一致；applyTheme()（§JS 14）
 *   选中主题后会整组替换，图表随主题换色。
 * ============================================================ */
let PAL = {
  bg: "#12100c", bgSoft: "#191510", card: "#1f1a13", card2: "#262017", line: "#362c1f",
  tx: "#ede5d6", txDim: "#9d9078", txFaint: "#6e6350",
  green: "#8dff5a", greenDim: "#5dbb3a", greenMid: "#4aa63c",
  brown: "#b07d4f", brownSoft: "#84603f",
};
/** #rgb / #rrggbb → [r,g,b]；解析失败抛错（applyTheme 里有兜底） */
function hexToRgb(h) {
  let s = String(h).trim().replace("#", "");
  if (s.length === 3) s = s.split("").map((c) => c + c).join("");
  if (!/^[0-9a-fA-F]{6}$/.test(s)) throw new Error("非法颜色值：" + h);
  const n = parseInt(s, 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
/** 颜色插值：t=0 得 a，t=1 得 b */
function hexMix(a, b, t) {
  const A = hexToRgb(a), B = hexToRgb(b);
  return "#" + A.map((x, i) => Math.round(x + (B[i] - x) * t).toString(16).padStart(2, "0")).join("");
}
const hexAlpha = (h, al) => { const [r, g, b] = hexToRgb(h); return `rgba(${r},${g},${b},${al})`; };

/* ============================================================
 * §JS 1 · 数据装载
 * ============================================================ */
let DATA = null;
try { DATA = JSON.parse($("#agentmole-data").textContent); }
catch (e) { console.error("agentmole-data JSON 解析失败", e); }

/** 把当前 DATA 序列化写回 #agentmole-data 块（发布对话框改 handle /
 *  撤下 skill 区后调用），保证捕获的 HTML 与页面显示一致（WYSIWYG），
 *  榜单侧解析到的也是同一份。"<" 按契约转义，防止提前闭合 script。 */
function syncDataBlock() {
  if (!DATA || DATA.placeholder) return;
  $("#agentmole-data").textContent = JSON.stringify(DATA).replace(/</g, "\\u003c");
}

/** 每个区块独立渲染；单区块失败只影响自己（保持隐藏），不拖垮整页 */
function safe(name, fn) {
  try { fn(); } catch (e) { console.error("渲染失败：" + name, e); }
}
function show(secId) { $(secId).hidden = false; }

/** v3.1 · persona 猜测取数（原型卡与 persona 区据此决定形象图归属） */
function personaGuesses() {
  const p = DATA && DATA.persona_guess;
  return (p && Array.isArray(p.guesses) ? p.guesses : []).filter((g) => g && g.guess);
}
/** 形象图仅接受 data: URI（信任面：绝不外链），否则 null */
function portraitURI() {
  return (typeof DATA.portrait === "string" && DATA.portrait.startsWith("data:image/"))
    ? DATA.portrait : null;
}

/* ============================================================
 * §JS 1c · 界面语言 chrome i18n（契约 v3.2 data.lang：2 位语言码，缺省 zh）
 *   全部界面文案按 key:[zh, en] 并排收录（en 省略 = 与 zh 同形），展开成
 *   I18N = {zh, en} 后查 TR 渲染；"{}" 为参数占位（F() 填充）。静态 HTML
 *   只留骨架，applyChrome() 统一填文案——单一来源、双语零漂移。
 *   数据内容（narrative/quotes 等）由 agent 按用户语言生成，不在此列。
 *
 *   语言解析（v3.2 多语言兜底）：只有 "zh"（或缺省 lang）走中文字典；
 *   其余任何 2 位码（en/ja/ko/es…）一律回退到 en——en 是全局兜底界面语言，
 *   保证 ja/ko/… 报告显示英文 chrome + agent 用母语写的正文，且未知码不崩。
 * ============================================================ */
const LANG = (DATA && DATA.lang && DATA.lang !== "zh") ? "en" : "zh";
const I18N_PAIRS = {
bnCta:["生成你自己的 →","Get yours →"],
bnDesc:["把这句话发给你的 AI agent：","Send this line to your AI agent:"],
bnCmd:["请读取 https://agentmole.dev/skill.md 并执行","Read https://agentmole.dev/skill.md and follow it"],
copy:["复制","Copy"],
copied:["已复制 ✓","Copied ✓"],
cpFail:["复制失败","Copy failed"],
shN:["发布 = 生成一个可分享的公开链接","Publishing gives you a shareable public link"],

const I18N = { zh: {}, en: {} };
for (const k in I18N_PAIRS) {
  const v = I18N_PAIRS[k];
  I18N.zh[k] = v[0]; I18N.en[k] = v.length > 1 ? v[1] : v[0];
}
const TR = I18N[LANG];
/** "{}" 占位填充：F("打败了 {}%", 82) */
const F = (s, ...a) => { let i = 0; return String(s).replace(/\{\}/g, () => a[i++]); };
/** 大数简写跟随语言：zh "41.2 万" / en "412K" */
const bigStr = (n) => { const f = fmtCN(n); return f.unit ? (LANG === "en" ? f.num + f.unit : f.num + " " + f.unit) : f.num; };

/** 静态 chrome 全部由字典填充（HTML 骨架不带文案；zh/en 同一条渲染路径） */
function applyChrome() {
  document.documentElement.lang = LANG === "en" ? "en" : "zh-CN";
  document.documentElement.setAttribute("data-lang", LANG);
  [[".viral-cta","bnCta"],[".viral-desc","bnDesc"],["#install-cmd","bnCmd"],["#btn-copy-cmd","copy"],
   [".share-note","shN"],["#btn-share","share"],
   ["#sec-diagnosis p","dIntro"],["#sec-skills p","sIntro"],["#sec-curve .card > .faint","cvCal"],
   ["#btn-percentile","pctBtn"],[".pct-note","pctN"],["#footer-meta","ftMeta"],["footer .trust","ftTrust"],
   ["#pub-confirm h3","pubT"],['label[for="pub-handle"]',"pubHL"],[".pub-wysiwyg","pubWy"],[".pub-edit-note","pubEdit"],
   ["#btn-confirm-pub","pubGo"],["#btn-cancel-pub","cancel"],["#pub-busy p","pubBN"],
   ["#pub-ok h3","pubOk"],["#btn-copy-url","cpLink"],["#btn-tweet","twBtn"],["#btn-close-ok","close"],
   ["#pub-fail h3","pubFT"],["#btn-retry","retry"],["#btn-close-fail","close"],
  ].forEach(([sel, k]) => { const n = $(sel); if (n) n.textContent = TR[k]; });
  renderTitle();
  $("#placeholder-note").replaceChildren(TR.ph[0], el("code", { text: "#agentmole-data" }), TR.ph[1]);
  for (const k in TR.sec) { const n = $("#sec-" + k + " .sec-head h2"); if (n) n.textContent = TR.sec[k]; }
  const lg = document.querySelectorAll("#sec-curve .legend span");
  if (lg[0]) lg[0].replaceChildren(lg[0].firstElementChild, TR.lgCorr);
  if (lg[1]) lg[1].replaceChildren(lg[1].firstElementChild, TR.lgRules);
  const ht = document.querySelectorAll("#sec-heatmap .chart-title");
  [[TR.htYear, TR.htYS], [TR.htHour, TR.htHS], [TR.htWeek, TR.htWS]].forEach((s, i) =>
    ht[i] && ht[i].replaceChildren(s[0], el("span", { class: "faint", text: s[1] })));
  $("#pub-handle").placeholder = TR.anon;
  $("#pub-skill-row > span").replaceChildren(TR.pubSM, el("span", { class: "sub", text: TR.pubSS }));
  $("#pub-busy h3").replaceChildren(el("span", { class: "spin" }), "\u00a0 " + TR.pubB);
  $("#pub-fail p").replaceChildren(TR.pubFail[0], el("b", { text: TR.pubFail[1] }), TR.pubFail[2]);
}

const SOURCE_LABEL = { claude_code: "Claude Code", codex: "Codex" };

// 报告大标题：优先用 agent 生成的 data.report_title（每人一句，用户语言）；
// 重点词落在「聊天记录 / chat log」上——命中就高亮，命中不了整句普通渲染；
// agent 没给标题时回退到固定默认（同样把重点放在 chat log 上）。
function renderTitle() {
  const h1 = $(".hero-txt h1");
  const t = (DATA && typeof DATA.report_title === "string") ? DATA.report_title.trim() : "";
  if (t) {
    const m = t.match(/聊天记录|chat[\s-]?logs?/i);
    if (m) {
      h1.replaceChildren(document.createTextNode(t.slice(0, m.index)),
        el("em", { text: m[0] }), document.createTextNode(t.slice(m.index + m[0].length)));
    } else {
      h1.replaceChildren(document.createTextNode(t));
    }
  } else {
    h1.replaceChildren(TR.h1[0], el("em", { text: TR.h1[1] }), TR.h1[2]);
  }
}

function renderHero() {
  const meta = $("#hero-meta");
  const handle = DATA.handle || TR.anon;
  meta.replaceChildren(...[ // 注意：replaceChildren 会把 null 渲染成 "null" 文本，必须先过滤
    el("span", { text: "@" + handle, style: "color:var(--tx);font-weight:700" }),
    DATA.period ? el("span", { text: DATA.period.from + " → " + DATA.period.to, style: "font-family:var(--mono);font-size:12.5px" }) : null,
    hasArr(DATA.sources) ? el("span", { class: "chip", text: DATA.sources.map((s) => SOURCE_LABEL[s] || s).join(" + ") }) : null,
    // 阵营/派系标签已按 owner 决策移除——标签不重要，不再展示
    DATA.mode === "fast" ? el("span", { class: "chip", text: TR.fastM }) : null,
  ].filter(Boolean));
  document.title = F(TR.docT, handle);
  if (DATA.generated_at) {
    $("#footer-meta").textContent = F(TR.ftGen, DATA.generated_at, DATA.schema_version || 1);
  }
}

/** 手写六维雷达图（0–1） */
function radarChart(dims) {
  const W = 340, H = 300, cx = W / 2, cy = H / 2 + 4, R = 96;
  const svg = sv("svg", { class: "chart", viewBox: `0 0 ${W} ${H}` });
  const pt = (i, r) => {
    const ang = -Math.PI / 2 + (i * 2 * Math.PI) / DIM_META.length;
    return [cx + r * Math.cos(ang), cy + r * Math.sin(ang)];
  };
  // 网格（4 圈）+ 轴线
  for (let g = 1; g <= 4; g++) {
    const pts = DIM_META.map((_, i) => pt(i, (R * g) / 4).join(",")).join(" ");
    svg.append(sv("polygon", { points: pts, fill: "none", stroke: PAL.line, "stroke-width": 1 }));
  }
  DIM_META.forEach((_, i) => {
    const [x, y] = pt(i, R);
    svg.append(sv("line", { x1: cx, y1: cy, x2: x, y2: y, stroke: PAL.line, "stroke-width": 1 }));
  });
  // 数值多边形
  const vals = DIM_META.map(([k]) => Math.max(0, Math.min(1, +dims[k] || 0)));
  const valPts = vals.map((v, i) => pt(i, v * R));
  svg.append(sv("polygon", {
    points: valPts.map((p) => p.join(",")).join(" "),
    fill: hexAlpha(PAL.green, .18), stroke: PAL.green, "stroke-width": 2, "stroke-linejoin": "round",
  }));
  valPts.forEach((p) => svg.append(sv("circle", { cx: p[0], cy: p[1], r: 3.2, fill: PAL.green })));
  // 标签：主名（查 TR.dims）+ 小号副行（zh 附英文名；en 只留数值，避免重复）
  DIM_META.forEach(([k, en], i) => {
    const [x, y] = pt(i, R + 24);
    const anchor = x > cx + 8 ? "start" : x < cx - 8 ? "end" : "middle";
    svg.append(sv("text", { x, y: y - 2, "text-anchor": anchor, "font-size": 11.5, fill: PAL.tx }, TR.dims[k] || en));
    const sub = LANG === "en" ? vals[i].toFixed(2) : en.toUpperCase() + " " + vals[i].toFixed(2);
    svg.append(sv("text", { x, y: y + 11, "text-anchor": anchor, "font-size": 8, fill: PAL.txFaint, "letter-spacing": 1 }, sub));
  });
  return svg;
}

}
