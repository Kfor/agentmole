/* ============================================================
 * §JS 5 · 硬核数字直觉化（PRD §4.3）
 *
 * token → 可感知量的换算口径（全部写死在此，供审查与复算）：
 *   · 1 token ≈ 0.75 个英文单词          （业界通用近似）
 *   · 一本书 ≈ 100,000 英文单词           （一本 300+ 页的非虚构书）
 *   · 认真读者一年读 24 本书              （两周一本）
 *     ⇒ 读书年数 = tokens × 0.75 ÷ 100,000 ÷ 24
 *   · 熟练打字员 40 词/分钟 × 8 小时/天 × 250 工作日/年
 *     ⇒ 亲手打字年数 = tokens × 0.75 ÷ 40 ÷ 60 ÷ 8 ÷ 250
 * ============================================================ */
function renderStats() {
  const s = DATA.stats;
  if (!s) return;

  // —— 主角数字：AI 总产出 tokens + 两条换算 ——
  //    v2 若给出 agent_out_tokens_estimated（外推估算总量），主显估算值
  //    并挂「估算」角标 + 口径 tooltip，实测值降为小字并列；否则维持实测。
  const hero = $("#stat-hero");
  hero.replaceChildren();
  const est = +s.agent_out_tokens_estimated > 0 ? +s.agent_out_tokens_estimated : 0;
  const primaryTokens = est || (+s.agent_out_tokens > 0 ? +s.agent_out_tokens : 0);
  if (primaryTokens > 0) {
    const t = primaryTokens;
    const words = t * 0.75;                       // 折合英文单词
    const readYears = words / 100000 / 24;        // 读书年数（口径见上）
    const typeYears = words / 40 / 60 / 8 / 250;  // 亲手打字年数（口径见上）
    const big = fmtCN(t);
    const n = el("div", { class: "n" }, big.num, el("small", { text: " " + big.unit + " tokens" }));
    if (est) {
      n.append(el("span", {
        class: "est-badge tip",
        // 口径 tooltip：优先用 skill 写入的 estimation_note（契约 v2），否则用内置说明
        "data-tip": (typeof s.estimation_note === "string" && s.estimation_note) || TR.estTip,
        text: TR.estB,
      }));
    }
    hero.append(
      n,
      el("div", { class: "label", text: TR.heroTk }),
      el("div", { class: "convert" },
        TR.cv[0], el("b", { text: F(TR.cvY, fmtInt(readYears)) }), TR.cv[1],
        el("b", { text: F(TR.cvY, fmtInt(typeYears)) }), TR.cv[2]
      )
    );
    if (est && s.agent_out_tokens > 0) {
      hero.append(el("div", { class: "est-measured", text: F(TR.estM, bigStr(s.agent_out_tokens)) }));
    }
    // 全口径总处理量（= 输出 + 新鲜输入 + cache 重读）：与 ccusage 等统计工具口径对齐，
    // 避免用户拿别的工具对比时以为这里算少了——两个口径并排、各自标注
    if (+s.total_processed_tokens > 0) {
      hero.append(el("div", { class: "est-measured tip",
        "data-tip": TR.totTip,
        text: F(TR.totL, bigStr(s.total_processed_tokens)) }));
    }
  }
  // 契约 v3：token 区常驻口径小字（无论是否显示估算值都在）
  hero.append(el("div", { class: "token-note", text: TR.tkN }));

  // —— 次级数字网格 ——
  const cells = [];
  const cell = (nParts, cn, en, hint) => {
    const nDiv = el("div", { class: "n" });
    nDiv.append(...nParts);
    cells.push(el("div", { class: "card stat-cell" }, nDiv,
      el("div", { class: "cn", text: cn }), el("div", { class: "en", text: en }),
      hint ? el("div", { class: "hint", text: hint }) : null));
  };
  if (s.leverage_ratio > 0)
    cell([el("em", { text: "1 : " }), fmtInt(s.leverage_ratio)], TR.cLev, "leverage",
      F(TR.hLev, fmtInt(s.leverage_ratio)));
  if (s.cache_hit_rate != null)
    cell([pct(s.cache_hit_rate)], TR.cCache, "cache hit", TR.hCache);
  // —— 契约 v3 要求独立展示的输入侧两卡（字段 v1 起就有，一直渲染） ——
  if (s.fresh_in_tokens > 0) {
    const f = fmtCN(s.fresh_in_tokens);
    cell([f.num, el("em", { text: " " + f.unit + " tokens" })], TR.cFresh, "fresh input", TR.hFresh);
  }
  if (s.cache_read_tokens > 0) {
    const f = fmtCN(s.cache_read_tokens);
    cell([f.num, el("em", { text: " " + f.unit + " tokens" })], TR.cCaR, "cache read", TR.hCaR);
  }
  if (s.active_days > 0)
    cell([fmtInt(s.active_days), el("em", { text: TR.uDay })], TR.cDays, "active days",
      s.longest_streak_days > 0 ? F(TR.hDays, s.longest_streak_days) : null);
  if (s.sessions > 0)
    cell([fmtInt(s.sessions), el("em", { text: TR.uSes })], TR.cSes, "sessions",
      s.api_calls > 0 ? F(TR.hSes, bigStr(s.api_calls)) : null);
  if (s.human_msgs > 0)
    cell([fmtInt(s.human_msgs), el("em", { text: TR.uMsg })], TR.cMsg, "human msgs",
      s.active_days > 0 ? F(TR.hMsg, Math.round(s.human_msgs / s.active_days)) : null);
  if (s.night_owl_index != null)
    cell([pct(s.night_owl_index)], TR.cNight, "night owl", TR.hNight);
  // —— v2 可选字段：缺失就不显示（优雅降级） ——
  if (s.session_turns_avg > 0)
    cell([trim1(s.session_turns_avg), el("em", { text: TR.uTur })], TR.cTur, "turns per session",
      s.session_turns_avg < 3 ? TR.hTur : null);
  if (s.skills_installed > 0)
    cell([fmtInt(s.skills_installed), el("em", { text: TR.uCnt })], TR.cSk, "skills installed",
      TR.hSk);
  // —— v3 新维度小卡：字段缺失就不显示（v1/v2 数据优雅降级） ——
  if (s.interruptions > 0)
    cell([fmtInt(s.interruptions), el("em", { text: TR.uTim })], TR.cInt, "interruptions",
      TR.hInt);
  if (s.parallel_peak_projects_hour > 1)
    cell([fmtInt(s.parallel_peak_projects_hour), el("em", { text: TR.uCnt })], TR.cPar, "parallel projects",
      TR.hPar);
  if (s.weekend_share != null)
    cell([pct(s.weekend_share)], TR.cWkd, "weekend share", TR.hWkd);
  if (s.sidechain_share != null)
    cell([pct(s.sidechain_share)], TR.cSid, "sidechain", TR.hSid);
  /* —— v3.1.1 效率倍数（机算，戏谑但有出处）——主口径按前 AI 时代工程师的**代码行数**折算：
   *   等效代码行 = 产出 tokens × 写码占比(usage_split.coding，缺失按 1) ÷ 8 tokens/行
   *     （一行代码平均 ~55 字符、代码类文本 ~7 字符/token → ≈8 tokens/行，毛估）
   *   日产出基线 = 50 行/天：Brooks《人月神话》报告大型系统项目 ~10 行/天/人，
   *     业界流传区间 10–100 行/天，取中位 50
   *   倍数 = 等效代码行 ÷ 活跃天数 ÷ 50
   *   副口径（打字速度）：40wpm 依据 Karat et al. (1999) 转录打字实测均值 ~33–38wpm、
   *     熟练者 50–80wpm——取 40 为普通职业水平；×60×8h×活跃天。 */
  if (primaryTokens > 0 && s.active_days > 0) {
    const codeShare = (s.usage_split && +s.usage_split.coding > 0) ? +s.usage_split.coding : 1;
    const loc = primaryTokens * codeShare / 8;
    const locMult = Math.round(loc / s.active_days / 50);
    const typeMult = Math.round(primaryTokens * .75 / (40 * 60 * 8 * s.active_days));
    if (locMult >= 2) {
      cell(["×" + fmtInt(locMult)], TR.cMult, "engineer multiplier",
        F(TR.hMult, bigStr(loc), fmtInt(locMult), fmtInt(typeMult)));
    }
  }
  $("#stat-grid").replaceChildren(...cells);

  // —— v3 等值 API 成本大卡（api_cost_estimated_usd，整数美元；缺失隐藏） ——
  const cost = +s.api_cost_estimated_usd > 0 ? Math.round(+s.api_cost_estimated_usd) : 0;
  if (cost) {
    const box = $("#cost-hero");
    box.hidden = false;
    box.replaceChildren(
      el("div", { class: "n" }, el("small", { text: "$" }), fmtInt(cost)),
      el("div", { class: "label", text: TR.costL }),
      el("div", { class: "cost-note", text: s.api_cost_note || TR.costN })
    );
  }

  /* —— v3 戏谑换算带：全部为毛估口径，仅供一乐（口径集中声明如下） ——
   *   · 能耗：输出 tokens × 0.3 Wh / 1k tokens（GPU 推理能耗毛估）→ 度电
   *   · 烧水：烧开一壶水 ≈ 0.15 kWh
   *   · 碳排：电网平均 0.5 kg CO₂ / 度；一棵树一年吸收 ≈ 20 kg CO₂
   *   · 手机：充满一次 ≈ 0.015 kWh
   *   · 拿铁：$5 一杯；MacBook Pro：$2,000 一台
   */
  const chips = [];
  const chip = (main, note) => chips.push(el("span", { class: "fun-chip" },
    el("b", { text: main }), el("small", { text: note })));
  if (primaryTokens > 0) {
    const kwh = primaryTokens * 0.3 / 1000 / 1000; // tokens → Wh → kWh
    chip(F(TR.fKwh, fmtInt(kwh)), TR.fKwhN);
    chip(F(TR.fKet, fmtInt(kwh / 0.15)), TR.fKetN);
    chip(F(TR.fTre, fmtInt(Math.max(1, kwh * 0.5 / 20))), TR.fTreN);
    chip(F(TR.fPho, fmtInt(kwh / 0.015)), TR.fPhoN);
  }
  if (cost) {
    chip(F(TR.fLat, fmtInt(cost / 5)), TR.fLatN);
    chip(F(TR.fMbp, trim1(cost / 2000)), TR.fMbpN);
  }
  if (chips.length) {
    const strip = $("#fun-strip");
    strip.hidden = false;
    strip.replaceChildren(...chips);
  }

  // —— v3 用途分布条（usage_split，关键词启发式；缺失隐藏） ——
  const US_META = [ // [key, 取色]（标签查 TR.usg；写码吃主题强调色；设计固定用品牌鼻粉，深浅主题都立得住）
    ["coding", () => PAL.green],
    ["design", () => "#ef9db0"],
    ["research", () => PAL.brown],
    ["management", () => PAL.txDim],
    ["other", () => PAL.txFaint],
  ];
  const us = s.usage_split;
  if (us && typeof us === "object") {
    const parts = US_META
      .map(([k, color]) => ({ label: TR.usg[k] || k, color: color(), v: +us[k] || 0 }))
      .filter((x) => x.v > 0);
    const total = parts.reduce((a, x) => a + x.v, 0);
    if (total > 0) {
      const bar = el("div", { class: "usage-bar" }, ...parts.map((x) =>
        el("i", { style: "width:" + pct(x.v / total, 2) + ";background:" + x.color, title: x.label + " " + pct(x.v / total) })));
      const legend = el("div", { class: "usage-legend" }, ...parts.map((x) =>
        el("span", null, el("i", { style: "background:" + x.color }), x.label + " " + pct(x.v / total))));
      const card = $("#usage-card");
      card.hidden = false;
      card.replaceChildren(
        el("div", { class: "chart-title", text: TR.usgT }), bar, legend,
        el("div", { class: "faint", style: "font-size:11.5px;margin-top:8px", text: TR.usgN })
      );
    }
  }

  // —— v3.1 模型座次 + effort 档位（都缺则整卡隐藏） ——
  const mcParts = [];
  if (s.models && typeof s.models === "object") {
    const top = Object.entries(s.models).filter(([, v]) => +v > 0)
      .sort((a, b) => b[1] - a[1]).slice(0, 5);
    if (top.length) {
      const mmax = top[0][1];
      mcParts.push(el("div", { class: "chart-title", text: TR.mdlT },
        el("span", { class: "faint", text: F(TR.mdlS, top.length) })),
        ...top.map(([name, v], i) => el("div", { class: "sig-row model-row" },
          el("span", { class: "sig-rank", text: String(i + 1).padStart(2, "0") }),
          // 短化模型名：去尾部日期后缀（20250514 / 2025-05-14 两种写法）
          el("span", { class: "sig-text", text: String(name).replace(/[-_]?20\d{2}-?\d{2}-?\d{2}$/, "") }),
          el("span", { class: "sig-bar-wrap" }, el("span", { class: "sig-bar", style: "width:" + pct(v / mmax) })),
          el("span", { class: "sig-count", text: fmtCN(v).num + " " + fmtCN(v).unit })
        )));
    }
  }
  if (s.effort_split && typeof s.effort_split === "object") {
    const ORD = ["xhigh", "high", "medium", "low", "minimal"]; // 档位习惯序
    const es = Object.entries(s.effort_split).filter(([, v]) => +v > 0)
      .sort((a, b) => (ORD.indexOf(a[0]) >>> 0) - (ORD.indexOf(b[0]) >>> 0));
    const etotal = es.reduce((a, [, v]) => a + +v, 0);
    if (etotal > 0) {
      const emax = Math.max(...es.map(([, v]) => +v));
      mcParts.push(el("div", { class: "chart-title", text: TR.efT },
        el("span", { class: "faint", text: TR.efS })),
        el("div", { class: "effort-strip" }, ...es.map(([k, v]) =>
          el("span", { class: "chip effort-badge" + (+v === emax ? " top" : "") },
            el("b", { text: k.toUpperCase() }), " ×" + fmtInt(v) + " · " + pct(v / etotal)))));
    }
  }
  if (mcParts.length) {
    const mc = $("#model-card");
    mc.hidden = false;
    mc.replaceChildren(...mcParts);
  }
  show("#sec-stats");
}

/* ============================================================
 * §JS 5b · 全网百分位对比（PRD §5.1「打败了 XX%」+ v3.2 原型身份行）
 * 信任面硬规则：只在用户点击「和全网鼹鼠比比」后运行，点击前零请求。
 * 同一次点击授权内：每轴一次 PERCENTILE GET（query 仅 axis+value，即
 * 下表 5 个数字；样本不足返回 {insufficient,total}）；排名正常返回后
 * 追加一次 ARCHETYPE_STATS GET（无参数，只读全网原型分布）。
 * 端点常量与发布端点同在 <head> 注释块声明（全文件仅三个出网点）。
 * ============================================================ */
const PCT_AXES = [ // [榜单轴 id, 取值函数]（轴 id 与 site Worker 对齐；标签查 TR.axis）
  ["out_tokens", (s) => s.agent_out_tokens],
  ["leverage", (s) => s.leverage_ratio],
  ["streak", (s) => s.longest_streak_days],
  ["night_owl", (s) => s.night_owl_index],
  ["low_correction", (s) => s.correction_rate],
];

async function fetchPercentile(axis, value) {
  const res = await fetch(AGENTMOLE_PERCENTILE_ENDPOINT +
    "?axis=" + encodeURIComponent(axis) + "&value=" + encodeURIComponent(value));
  if (!res.ok) throw new Error("HTTP " + res.status);
  const out = await res.json();
  // 契约（docs/data-contract.md）：样本不足 → {insufficient: true, total}
  if (out && out.insufficient) return { insufficient: true, total: +out.total || 0 };
  // 正常：{total, beaten, pct}；宽容兼容 beat/percentile 拼写
  let p = (out && typeof out.pct === "number") ? out.pct
        : (out && typeof out.beat === "number") ? out.beat
        : (out && typeof out.percentile === "number") ? out.percentile : NaN;
  if (!isFinite(p)) throw new Error("响应缺少 pct 数字");
  if (p <= 1) p *= 100; // 兼容 0–1 比例与 0–100 百分数两种返回
  return { pct: Math.max(0, Math.min(100, p)) };
}

/** 追加请求全网原型分布（与排名对比同一次点击授权；失败静默省略）。
 *  返回 MBTI 式身份行元素或 null：「你是全网 X% 的『原型名』」。 */
async function fetchArchetypeIdentity() {
  const a = DATA && DATA.archetype;
  if (!a || !a.id) return null;
  const res = await fetch(AGENTMOLE_ARCHETYPE_STATS_ENDPOINT);
  if (!res.ok) return null;
  const out = await res.json();
  if (!out || out.insufficient || !Array.isArray(out.dist)) return null;
  // 契约：dist 条目为 {archetype_id, archetype_name, n, pct}（pct 0–100 一位小数）；宽容兼容 id 拼写
  const hit = out.dist.find((d) => d && (d.archetype_id === a.id || d.id === a.id) &&
    typeof d.pct === "number" && isFinite(d.pct));
  if (!hit) return null; // dist 里找不到本页原型：不显示
  let p = hit.pct;
  const sum = out.dist.reduce((acc, d) => acc + (typeof d.pct === "number" ? d.pct : 0), 0);
  if (sum <= 1.5) p *= 100; // 宽容兼容 0–1 比例返回
  p = Math.max(0, Math.min(100, p));
  const pStr = (p >= 10 ? String(Math.round(p)) : trim1(p)) + "%";
  return el("div", { class: "pct-identity" },
    TR.idn[0], el("b", { text: pStr }), TR.idn[1],
    el("span", { class: "arch", text: a.name || a.id }), TR.idn[2]);
}

async function comparePercentiles() {
  const btn = $("#btn-percentile");
  const out = $("#pct-result");
  const scope = () => el("div", { class: "pct-scope", text: TR.pctSc }); // 常驻口径小字
  const s = (DATA && DATA.stats) || {};
  const entries = PCT_AXES
    .map(([axis, get]) => ({ axis, label: TR.axis[axis] || axis, value: get(s) }))
    .filter((x) => typeof x.value === "number" && isFinite(x.value));
  if (!entries.length) {
    out.hidden = false;
    out.replaceChildren(el("div", { class: "pct-fail", text: TR.pctND }));
    return;
  }
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = TR.pctB;
  const results = await Promise.allSettled(entries.map((x) => fetchPercentile(x.axis, x.value)));
  btn.disabled = false;
  btn.textContent = orig === TR.pctBtn ? TR.pctAg : orig;
  out.hidden = false;
  if (results.every((r) => r.status === "rejected")) { // 全挂：一句话降级
    out.replaceChildren(el("div", { class: "pct-fail", text: TR.pctAF }), scope());
    return;
  }
  const insuff = results.find((r) => r.status === "fulfilled" && r.value.insufficient);
  if (insuff) { // 样本不足：整块一句话，不逐轴罗列
    out.replaceChildren(el("div", { class: "pct-fail", text: F(TR.pctIns, fmtInt(insuff.value.total)) }), scope());
    return;
  }
  out.replaceChildren(...entries.map((x, i) => {
    const r = results[i];
    if (r.status === "fulfilled") {
      return el("div", { class: "pct-row" },
        el("span", { class: "axis", text: x.label }), TR.pctBeat[0],
        el("b", { text: r.value.pct.toFixed(0) + "%" }), TR.pctBeat[1]);
    }
    return el("div", { class: "pct-row pct-fail" },
      el("span", { class: "axis", text: x.label }), TR.pctRF);
  }), scope());
  // 正常响应后追加：全网原型分布 → 结果区顶部的身份行（失败静默）
  try {
    const idRow = await fetchArchetypeIdentity();
    if (idRow) out.prepend(idRow);
  } catch (e) { /* 身份行拿不到就不显示，不影响排名结果 */ }
}

/* ============================================================
 * §JS 6 · 词云 + 口头禅榜（PRD §4.4）
 *   词云 = 字号按 √weight 加权的 flex 布局；大词从中间向两侧交错铺开。
 * ============================================================ */
function renderWords() {
  const words = DATA.wordcloud && DATA.wordcloud.words;
  const sigs = DATA.quotes && DATA.quotes.signature;
  if (!hasArr(words) && !hasArr(sigs)) return;

  if (hasArr(words)) {
    const sorted = [...words].slice(0, 80).sort((a, b) => b.weight - a.weight);
    const wMax = sorted[0].weight, wMin = sorted[sorted.length - 1].weight;
    const colors = [PAL.green, PAL.tx, PAL.brown, PAL.txDim, PAL.greenDim];
    // 交错排列：最大的词落在容器中部，视觉近似词云
    const order = [];
    sorted.forEach((w, i) => (i % 2 ? order.push(w) : order.unshift(w)));
    const cloud = $("#cloud");
    cloud.replaceChildren(...order.map((w) => {
      const t = wMax === wMin ? 1 : Math.sqrt((w.weight - wMin) / (wMax - wMin));
      const rank = sorted.indexOf(w);
      return el("span", {
        text: w.text, title: "×" + fmtInt(w.weight),
        style: `font-size:${Math.round(13 + t * 33)}px;` +
               `font-weight:${t > 0.55 ? 800 : 500};` +
               `color:${colors[rank % colors.length]};` +
               `opacity:${0.6 + t * 0.4}`,
      });
    }));
  } else { $("#cloud").parentElement.hidden = true; }

  if (hasArr(sigs)) {
    const max = Math.max(...sigs.map((x) => x.count));
    $("#sig-list").replaceChildren(
      el("div", { class: "quote-label", text: TR.sigL }),
      ...sigs.slice(0, 10).map((x, i) => el("div", { class: "sig-row" },
        el("span", { class: "sig-rank", text: String(i + 1).padStart(2, "0") }),
        el("span", { class: "sig-text", text: F(TR.q, x.text) }),
        el("span", { class: "sig-bar-wrap" }, el("span", { class: "sig-bar", style: "width:" + pct(x.count / max) })),
        el("span", { class: "sig-count", text: "×" + fmtInt(x.count) })
      ))
    );
  } else { $("#sig-list").hidden = true; }
  show("#sec-wordcloud");
}

/* ============================================================
 * §JS 7 · 磨合曲线（PRD §4.5）：纠偏率折线 + 累计规则副轴
 * ============================================================ */
function renderCurve() {
  const c = DATA.taming_curve;
  if (!hasArr(c) || c.length < 2) return;
  const W = 680, H = 240, L = 46, Rm = 46, T = 14, B = 30;
  const iw = W - L - Rm, ih = H - T - B;
  const svg = sv("svg", { class: "chart", viewBox: `0 0 ${W} ${H}` });

  const rateMaxPct = Math.max(1, Math.ceil(Math.max(...c.map((d) => d.correction_rate)) * 100)); // 左轴：%
  const rulesMax = Math.max(1, Math.ceil(Math.max(...c.map((d) => d.rules_cumulative || 0)) / 20) * 20); // 右轴
  const X = (i) => L + (i / (c.length - 1)) * iw;
  const Yr = (v) => T + ih - (v * 100 / rateMaxPct) * ih;   // correction_rate
  const Yn = (v) => T + ih - (v / rulesMax) * ih;           // rules_cumulative

  // 横向网格 + 双轴刻度
  for (let g = 0; g <= 3; g++) {
    const y = T + (ih * g) / 3;
    svg.append(sv("line", { x1: L, y1: y, x2: W - Rm, y2: y, stroke: PAL.line }));
    svg.append(sv("text", { x: L - 7, y: y + 4, "text-anchor": "end", "font-size": 10, fill: PAL.txFaint },
      (rateMaxPct * (1 - g / 3)).toFixed(1) + "%"));
    svg.append(sv("text", { x: W - Rm + 7, y: y + 4, "text-anchor": "start", "font-size": 10, fill: PAL.txFaint },
      String(Math.round(rulesMax * (1 - g / 3)))));
  }
  // 月份刻度（自适应间隔）
  const step = Math.ceil(c.length / 8);
  c.forEach((d, i) => {
    if (i % step && i !== c.length - 1) return;
    svg.append(sv("text", { x: X(i), y: H - 8, "text-anchor": "middle", "font-size": 9.5, fill: PAL.txFaint },
      String(d.month).slice(2)));
  });
  // 两条折线
  const line = (pts, color, dash) => sv("polyline", {
    points: pts.join(" "), fill: "none", stroke: color, "stroke-width": 2.4,
    "stroke-linejoin": "round", "stroke-linecap": "round", ...(dash ? { "stroke-dasharray": "6 5" } : {}),
  });
  svg.append(line(c.map((d, i) => X(i) + "," + Yn(d.rules_cumulative || 0)), PAL.brown, true));
  svg.append(line(c.map((d, i) => X(i) + "," + Yr(d.correction_rate)), PAL.green));
  c.forEach((d, i) => {
    const dot = sv("circle", { cx: X(i), cy: Yr(d.correction_rate), r: 3.4, fill: PAL.green });
    dot.append(sv("title", null, d.month + " · " + TR.tipCorr + " " + pct(d.correction_rate, 1) + " · " + TR.tipRules + " " + (d.rules_cumulative || 0)));
    svg.append(dot);
  });
  $("#curve-chart").replaceChildren(svg);

  const first = c[0], last = c[c.length - 1];
  const drop = first.correction_rate > 0 ? (1 - last.correction_rate / first.correction_rate) : 0;
  $("#curve-note").textContent = F(TR.cvN,
    pct(first.correction_rate, 1), pct(last.correction_rate, 1), pct(drop), last.rules_cumulative || 0);
  show("#sec-curve");
}

/* ============================================================
 * §JS 8 · 作息（PRD §4.6）：GitHub 风热力图 + 24h 柱状 + 星期分布
 * ============================================================ */
/** 热力 5 档色阶：从卡片底色到主题强调色（主题切换后自动跟随 PAL）。
 *  注意从 card 而非 bg 起混：图表都画在卡片上，深色主题两者几乎相同，
 *  浅色主题（如 brutalist 白卡黄底）从 card 起混才能得到干净的浅→深色阶。 */
function heatColors() {
  return [PAL.card2, hexMix(PAL.card, PAL.green, .24), hexMix(PAL.card, PAL.green, .45),
          hexMix(PAL.card, PAL.green, .7), PAL.green];
}

function renderRhythm() {
  const s = DATA.stats || {};
  const hasHeat = s.daily_activity && Object.keys(s.daily_activity).length > 0;
  const hasHour = hasArr(s.hour_histogram);
  const hasWeek = hasArr(s.weekday_histogram);
  if (!hasHeat && !hasHour && !hasWeek) return;

  if (hasHeat) renderHeatmap(s.daily_activity);
  else { $("#heatmap").hidden = true; $("#heat-legend").hidden = true; $("#heatmap").previousElementSibling.hidden = true; }
  if (hasHour) renderHourChart(s.hour_histogram);
  else { $("#hour-chart").hidden = true; $("#hour-chart").previousElementSibling.hidden = true; }
  if (hasWeek) renderWeekdayChart(s.weekday_histogram);
  else { $("#weekday-chart").hidden = true; $("#weekday-chart").previousElementSibling.hidden = true; }
  show("#sec-heatmap");
}

/** 贡献图：列 = 周（周一起），行 = 星期；颜色分 5 档（0 + 四分位） */
function renderHeatmap(daily) {
  const dates = Object.keys(daily).sort();
  const parse = (str) => { const [y, m, d] = str.split("-").map(Number); return new Date(y, m - 1, d); };
  const fmtD = (d) => d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  const start = parse(dates[0]);
  start.setDate(start.getDate() - ((start.getDay() + 6) % 7)); // 回退到周一
  const end = parse(dates[dates.length - 1]);
  const max = Math.max(...dates.map((k) => daily[k]));
  const level = (v) => !v ? 0 : v <= max * .25 ? 1 : v <= max * .5 ? 2 : v <= max * .75 ? 3 : 4;

  const CELL = 12, GAP = 3, PAD_L = 26, PAD_T = 16;
  const days = []; // {date, col, row, v}
  for (let d = new Date(start), i = 0; d <= end; d.setDate(d.getDate() + 1), i++) {
    days.push({ key: fmtD(d), col: Math.floor(i / 7), row: i % 7, m: d.getMonth(), day: d.getDate() });
  }
  const cols = days[days.length - 1].col + 1;
  const W = PAD_L + cols * (CELL + GAP), H = PAD_T + 7 * (CELL + GAP) + 2;
  const svg = sv("svg", { width: W, height: H, viewBox: `0 0 ${W} ${H}`, style: "display:block" });
  const RAMP = heatColors();

  // 月份标签（该列里出现每月 1 号时标注）
  days.filter((d) => d.day === 1).forEach((d) => {
    svg.append(sv("text", { x: PAD_L + d.col * (CELL + GAP), y: 10, "font-size": 9, fill: PAL.txFaint },
      TR.monL[d.m]));
  });
  // 星期标签
  [0, 2, 4, 6].forEach((w, i) => {
    svg.append(sv("text", { x: 2, y: PAD_T + (i * 2) * (CELL + GAP) + CELL - 2, "font-size": 9, fill: PAL.txFaint }, TR.wkN[w]));
  });
  // 格子：日期与数值挂在 data-* 上，tooltip 由下方事件委托统一驱动
  for (const d of days) {
    const v = daily[d.key] || 0;
    svg.append(sv("rect", {
      x: PAD_L + d.col * (CELL + GAP), y: PAD_T + d.row * (CELL + GAP),
      width: CELL, height: CELL, rx: 2.5, fill: RAMP[level(v)],
      class: "heat-cell", "data-date": d.key, "data-count": v,
    }));
  }
  const box = $("#heatmap");
  box.replaceChildren(svg);

  // —— GitHub 化 tooltip：单个复用的浮层，纯 JS 定位，零依赖 ——
  const tip = el("div", { class: "heat-tip", hidden: "" });
  box.append(tip);
  svg.addEventListener("mouseover", (ev) => {
    const cell = ev.target;
    if (!(cell instanceof Element) || !cell.classList.contains("heat-cell")) return;
    tip.textContent = F(TR.htTip, cell.getAttribute("data-date"), fmtInt(+cell.getAttribute("data-count")));
    tip.hidden = false;
    const bb = box.getBoundingClientRect(), rb = cell.getBoundingClientRect();
    const cxp = rb.left - bb.left + box.scrollLeft + rb.width / 2;
    // 顶部两行的格子朝下弹，其余朝上弹，避免被容器裁掉
    const above = rb.top - bb.top > 44;
    tip.style.left = Math.round(Math.min(Math.max(cxp - tip.offsetWidth / 2, box.scrollLeft),
      box.scrollLeft + box.clientWidth - tip.offsetWidth)) + "px";
    tip.style.top = Math.round(above
      ? rb.top - bb.top + box.scrollTop - tip.offsetHeight - 7
      : rb.bottom - bb.top + box.scrollTop + 7) + "px";
  });
  svg.addEventListener("mouseout", (ev) => {
    if (ev.target instanceof Element && ev.target.classList.contains("heat-cell")) tip.hidden = true;
  });

  const lg = $("#heat-legend");
  lg.replaceChildren(el("span", { text: TR.htL }),
    ...RAMP.map((c) => el("i", { style: "background:" + c })), el("span", { text: TR.htM }));
}

/** 24 小时柱状图；00–06 夜行时段用棕色区分 */
function renderHourChart(hist) {
  const W = 680, H = 170, L = 34, B = 24, T = 10;
  const iw = W - L - 10, ih = H - T - B, bw = iw / 24;
  const max = Math.max(...hist, 1);
  const svg = sv("svg", { class: "chart", viewBox: `0 0 ${W} ${H}` });
  hist.slice(0, 24).forEach((v, h) => {
    const bh = (v / max) * ih;
    const night = h < 6;
    const bar = sv("rect", {
      x: L + h * bw + 2, y: T + ih - bh, width: bw - 4, height: Math.max(bh, v > 0 ? 2 : 0), rx: 3,
      fill: night ? PAL.brown : (v === max ? PAL.green : PAL.greenMid),
      opacity: night ? .95 : .9,
    });
    bar.append(sv("title", null, F(TR.hrTip, String(h).padStart(2, "0"), String(h).padStart(2, "0"), fmtInt(v))));
    svg.append(bar);
    if (h % 3 === 0) svg.append(sv("text", { x: L + h * bw + bw / 2, y: H - 7, "text-anchor": "middle", "font-size": 9.5, fill: PAL.txFaint }, String(h)));
  });
  svg.append(sv("text", { x: L - 6, y: T + 8, "text-anchor": "end", "font-size": 9.5, fill: PAL.txFaint }, fmtCN(max).num + fmtCN(max).unit));
  $("#hour-chart").replaceChildren(svg);
}

/** 星期分布（周一起） */
function renderWeekdayChart(hist) {
  const NAMES = TR.wkN;
  const W = 680, H = 120, L = 34, B = 22, T = 8;
  const iw = W - L - 10, ih = H - T - B, bw = iw / 7;
  const max = Math.max(...hist, 1);
  const svg = sv("svg", { class: "chart", viewBox: `0 0 ${W} ${H}` });
  hist.slice(0, 7).forEach((v, i) => {
    const bh = (v / max) * ih;
    const bar = sv("rect", {
      x: L + i * bw + bw * .18, y: T + ih - bh, width: bw * .64, height: Math.max(bh, v > 0 ? 2 : 0), rx: 4,
      fill: v === max ? PAL.green : PAL.greenMid, opacity: .9,
    });
    bar.append(sv("title", null, F(TR.wkTip, NAMES[i], fmtInt(v))));
    svg.append(bar);
    svg.append(sv("text", { x: L + i * bw + bw / 2, y: H - 6, "text-anchor": "middle", "font-size": 10, fill: PAL.txFaint }, NAMES[i]));
  });

}

// 把建议 + skill 草稿拼成一段可直接粘给 agent 的 markdown（含开场指令）
function buildAgentPayload() {
  const recs = hasArr(DATA.recommendations) ? DATA.recommendations : [];
  const skills = hasArr(DATA.distilled_skills) ? DATA.distilled_skills
    : (typeof SKILLS_STASH !== "undefined" && SKILLS_STASH ? SKILLS_STASH : []);
  let out = TR.feedPre + "\n\n";
  if (recs.length) {
    out += "## " + TR.sec.recommendations + "\n\n";
    recs.forEach((r, i) => {
      out += (i + 1) + ". " + (r.title || "") + "\n";
      if (r.rationale) out += "   - " + r.rationale + "\n";
      if (r.action) out += "   - " + TR.recAct + ": " + r.action + "\n";
      if (r.impact) out += "   - " + TR.recImp + ": " + r.impact + "\n";
      out += "\n";
    });
  }
  if (skills.length) {
    out += "## " + TR.sec.skills + "\n\n";
    skills.forEach((x) => {
      out += "### " + (x.title || "") + (x.kind === "claude-md-patch" ? " (" + TR.skP + ")" : "") +
        "\n\n" + (x.body || "") + "\n\n";
    });
  }
  return out.trim();
}

/** 置信度三档归一；未知返回 null（原样展示，不上色）；展示名查 TR.conf */
function confKey(c) {
  c = String(c || "").toLowerCase().trim();
  return { high: "high", "高": "high", medium: "medium", mid: "medium", "中": "medium", low: "low", "低": "low" }[c] || null;

function renderPersona() {
  const gs = personaGuesses();

  const kids = [el("div", { class: "pg-kicker", text: TR.pKick })];

    img.src = portraitURI();
    kids.push(el("figure", { class: "persona-figure" }, img));
  }
  gs.slice(0, 6).forEach((g, i) => {
    const key = confKey(g.confidence);
    kids.push(el("div", { class: "pg" },
      el("div", { class: "pg-head" },

      g.why ? el("div", { class: "pg-why", text: F(TR.pWhy, g.why) }) : null));
  });
  const note = DATA.persona_guess.note;
  if (note) kids.push(el("div", { class: "persona-note", text: note }));

  show("#sec-persona");

function renderSkills() {

    const btnSediment = el("button", { class: "btn btn-copy", type: "button", text: TR.cpSed });

        (seen ? el("span", { class: "skill-seen", text: "≈" + fmtInt(seen) + "×", title: TR.skSeen }) : null),
        btnSediment, btn),

/* ============================================================
 * §JS 12 · 发布（PRD §2⑤ / §3.1 WYSIWYG consent）
 *   点击「分享」→ 先弹发布对话框（展示名 + skill 区开关 + 明示
 *   「发布 = 原样上传当前页面」）→ 用户点「确认发布」后才捕获
 *   outerHTML 并 POST 到 AGENTMOLE_PUBLISH_ENDPOINT（端点声明在 <head>）。
 *   对话框里的每个改动都先落到 DOM / #agentmole-data 再捕获——
 *   页面上是什么，上传的就是什么。
 * ============================================================ */
let publishing = false;
let SKILLS_STASH = null; // 「随页发布 skill 蒸馏区」取消勾选时暂存被撤下的内容

/** 捕获页面自身 HTML。捕获前把弹窗复位，避免把"发布中"状态固化进公开页。 */
function captureSelfHTML() {
  const mask = $("#pub-mask");
  const wasHidden = mask.hidden;
  mask.hidden = true;
  const html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
  mask.hidden = wasHidden;
  return html;
}
function pubState(state) { // "confirm" | "busy" | "ok" | "fail" | null
  $("#pub-mask").hidden = state === null;
  $("#pub-confirm").hidden = state !== "confirm";
  $("#pub-busy").hidden = state !== "busy";
  $("#pub-ok").hidden = state !== "ok";
  $("#pub-fail").hidden = state !== "fail";
}

/** 点「分享」：打开发布前确认对话框（不发任何请求） */
function openPublishDialog() {
  const input = $("#pub-handle");
  input.value = (DATA && !DATA.placeholder && DATA.handle) || "";
  // 只有页面上确实有 skill 蒸馏区（或刚被撤下）时才展示开关
  const hasSkills = (DATA && hasArr(DATA.distilled_skills)) || SKILLS_STASH;
  $("#pub-skill-row").hidden = !hasSkills;
  $("#pub-skill-chk").checked = !SKILLS_STASH; // 已撤下 → 保持未勾选
  pubState("confirm");
}

/** 展示名输入：先改 DOM（标题 + 头部）与 #agentmole-data，再谈捕获（WYSIWYG） */
function onHandleInput(ev) {
  if (!DATA || DATA.placeholder) return;
  const v = ev.target.value.trim();
  DATA.handle = v || null; // 空 = 匿名鼹鼠（契约允许 null）
  safe("hero", renderHero); // 头部与 <title> 立即跟随
  syncDataBlock();
}

/** skill 蒸馏区随页发布开关：
 *  取消勾选 → 立即从页面撤下 sec-skills（隐藏 + 清空已渲染内容），
 *  并从 #agentmole-data 移除 distilled_skills——所见即所传，
 *  撤下的内容不会出现在捕获的 HTML 里。重新勾选 → 原样恢复。 */
function toggleSkillsForPublish(include) {
  if (!DATA || DATA.placeholder) return;
  if (!include && hasArr(DATA.distilled_skills)) {
    SKILLS_STASH = DATA.distilled_skills;
    delete DATA.distilled_skills;
    $("#skill-list").replaceChildren(); // 清掉 DOM，捕获的 HTML 里不残留正文
    $("#sec-skills").hidden = true;
    syncDataBlock();
  } else if (include && SKILLS_STASH) {
    DATA.distilled_skills = SKILLS_STASH;
    SKILLS_STASH = null;
    syncDataBlock();
    safe("skills", renderSkills); // 重新渲染并显示
  }
}
async function publishReport() {
  if (publishing) return;
  publishing = true;
  const html = captureSelfHTML(); // 先捕获，保证弹窗不入镜
  pubState("busy");
  try {
    // ↓↓↓ 全文件唯一的发布请求（另一个出网点是 §JS 5b 的排名对比 GET）↓↓↓
    const res = await fetch(AGENTMOLE_PUBLISH_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "text/html" },
      body: html,
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const out = await res.json();
    if (!out || !out.url) throw new Error("响应缺少 url 字段");
    showPublished(out.url);
  } catch (e) {
    $("#pub-fail-detail").textContent = F(TR.pubFD, e && e.message ? e.message : String(e));
    pubState("fail");
  } finally {
    publishing = false;
  }
}
function showPublished(url) {
  $("#pub-url-text").textContent = url;
  // 发推文案：原型 + 大数字 + 链接（文案查 TR.tweet）
  const a = DATA.archetype, s = DATA.stats;
  const tokens = s && s.agent_out_tokens ? bigStr(s.agent_out_tokens) + " tokens" : "";
  const text = TR.tweet(a && a.name ? a.name : TR.myst, tokens, url);
  $("#btn-tweet").href = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(text);
  pubState("ok");
}

/* ============================================================
 * §JS 14 · 主题机制
 *   选择顺序：data.theme → archetype_map[data.archetype.id] → default。
 *   主题 = 把 8 个键（--bg/--card/--ink/--dim/--acc/--font/--radius/--border）
 *   映射 + 派生成 §CSS 0 的整组变量后套用到 :root，同时替换 PAL
 *   让 SVG 图表跟随换色。品牌 lockup / 吉祥物 / 阵营色写死，不随主题走。
 *   AGENTMOLE_THEMES 常量由构建时把 docs/themes.json 内容原样内联而来。
 * ============================================================ */
/*AGENTMOLE:THEMES-START（构建时以 docs/themes.json 内容整体替换本常量的值）*/
const AGENTMOLE_THEMES = {"$comment": "Agentmole 报告页主题 v2.0。单一主题 = Neo-brutalism（撞色 + 3px 黑框 + 硬投影 + 半调网点），既是报告页也是官网的统一视觉身份。每个主题含 8 键 CSS vars（模板机械套用）+ prompt（完整英文样式指导，全部内联、自足，agent 不需要也不应该访问任何外部风格网站）。logo/吉祥物固定不变。风格出处与致谢见仓库 docs/ATTRIBUTION.md（不随站点分发）。", "default": "brutalist", "themes": {"brutalist": {"name": "新粗野主义", "vibe": "高饱和撞色加三像素黑框，说话从不拐弯，修不好根因就别想收工", "vars": {"--bg": "#f5efe3", "--card": "#ffffff", "--ink": "#111111", "--dim": "#4a4a4a", "--acc": "#3d24ff", "--font": "Arial,'Helvetica Neue','PingFang SC',sans-serif", "--radius": "0px", "--border": "3px solid #111111"}}}};
/*AGENTMOLE:THEMES-END*/

function pickTheme() {
  if (!DATA || DATA.placeholder) return null;
  const T = AGENTMOLE_THEMES;
  if (!T || !T.themes) return null;
  let id = DATA.theme
    || (T.archetype_map && DATA.archetype && T.archetype_map[DATA.archetype.id])
    || T.default;
  if (!T.themes[id]) id = T.default; // 未知主题名：兜底 default
  const theme = T.themes[id] || null;
  if (theme) theme.id = id; // 记下主题 key，供 applyTheme 写 data-theme（§CSS 11 主题骨相按此生效）
  return theme;
}

function applyTheme() {
  const theme = pickTheme();
  if (!theme || !theme.vars) return; // 无主题可用：保持 :root 内置默认，视觉不变
  const v = theme.vars;
  const bg = v["--bg"], card = v["--card"], ink = v["--ink"], dim = v["--dim"], acc = v["--acc"];
  if (!(bg && card && ink && dim && acc)) return; // 颜色键不齐：不套用（优雅降级）
  // 主题骨相：变量套用成功才写 data-theme，CSS 侧（§CSS 11）按它叠加各风格的结构性规则
  if (theme.id) document.documentElement.setAttribute("data-theme", theme.id);
  // 从 --border 声明里拎出边框颜色（如 "3px solid #111111"）；拎不出就从 dim/bg 派生
  const m = String(v["--border"] || "").match(/#[0-9a-fA-F]{3,8}/);
  const lineColor = m ? m[0] : hexMix(dim, bg, .6);
  // 5 个颜色键 → 完整调色板（hexMix 对非法色值会抛错，由外层 safe() 兜住）
  PAL = {
    bg, card, tx: ink, txDim: dim, green: acc,
    bgSoft: hexMix(bg, card, .5),
    card2: hexMix(card, ink, .08),
    line: lineColor,
    txFaint: hexMix(dim, bg, .4),
    greenDim: hexMix(acc, bg, .35),
    greenMid: hexMix(acc, card, .45), // 只做图表柱条填充：柱条画在卡片上，向 card 混才不发闷（浅色主题尤甚）
    brown: hexMix(dim, acc, .3),
    brownSoft: hexMix(hexMix(dim, acc, .3), bg, .35),
  };
  // —— 整组 CSS 变量套用到 :root（主题只换变量，不动 DOM 结构） ——
  const setv = (k, val) => document.documentElement.style.setProperty(k, val);
  setv("--bg", PAL.bg); setv("--bg-soft", PAL.bgSoft);
  setv("--card", PAL.card); setv("--card-2", PAL.card2);
  setv("--line", PAL.line);
  setv("--tx", PAL.tx); setv("--tx-dim", PAL.txDim); setv("--tx-faint", PAL.txFaint);
  setv("--green", PAL.green); setv("--green-dim", PAL.greenDim);
  setv("--green-soft", hexAlpha(PAL.green, .14));
  setv("--brown", PAL.brown); setv("--brown-soft", PAL.brownSoft);
  if (v["--font"]) setv("--font", v["--font"]);
  if (v["--radius"] != null) setv("--radius", v["--radius"]);
  if (v["--border"]) setv("--card-border", v["--border"]);
  setv("--topbar-bg", hexAlpha(PAL.bg, .88));
  setv("--banner-a", hexMix(PAL.bg, PAL.brown, .12));
  setv("--banner-b", hexMix(PAL.bg, PAL.green, .08));
  setv("--arch-a", hexMix(PAL.bg, PAL.brown, .14));
  setv("--arch-b", hexMix(PAL.bg, PAL.green, .07));
  setv("--arch-line", hexAlpha(PAL.green, .22));
  setv("--green-line", hexAlpha(PAL.green, .3));
  setv("--brown-line", hexAlpha(PAL.brown, .5));
  setv("--btn-hover", hexMix(PAL.card2, PAL.tx, .07));
}

/* ============================================================
 * §JS 13 · 启动：装载数据 → 套主题 → 逐区块渲染 → 绑事件
 * ============================================================ */
(function main() {
  // 事件绑定（与数据无关，始终生效）
  $("#btn-share").addEventListener("click", openPublishDialog); // 先确认，后发布
  $("#btn-confirm-pub").addEventListener("click", publishReport);
  $("#btn-cancel-pub").addEventListener("click", () => pubState(null));
  $("#pub-handle").addEventListener("input", onHandleInput);
  $("#pub-skill-chk").addEventListener("change", (e) => toggleSkillsForPublish(e.currentTarget.checked));
  $("#btn-retry").addEventListener("click", publishReport);
  $("#btn-close-ok").addEventListener("click", () => pubState(null));
  $("#btn-close-fail").addEventListener("click", () => pubState(null));
  $("#btn-copy-url").addEventListener("click", (e) => copyText($("#pub-url-text").textContent, e.currentTarget));
  $("#btn-copy-cmd").addEventListener("click", (e) => copyText($("#install-cmd").textContent, e.currentTarget));
  $("#btn-percentile").addEventListener("click", comparePercentiles); // 点击前零请求
  // 排行榜入口 v1 暂不露出（owner 决策）——不给隐藏的链接赋值

  safe("chrome", applyChrome); // 界面语言（data.lang）：静态 chrome 全部按 I18N 字典重刷
  if (!DATA || DATA.placeholder) { // 模板裸开 / 数据坏：不渲染，仅提示
    $("#placeholder-note").hidden = false;
    return;
  }
  safe("theme", applyTheme); // 先套主题：后续 SVG 图表渲染读取 PAL
  safe("hero", renderHero);
  // 契约 v3.2 顺序（16 区块）：原型 → 关键数字带 → 协作解读 → 金句 → 名场面 → 信条
  // → 数字 → 阵营 → 词云 → 曲线 → 作息 → 徽章 → 诊断 → 下一步建议 → 我猜猜你是谁 → skill
  safe("archetype", renderArchetype);
  safe("keyline", renderKeyline);
  safe("narrative", renderNarrative);
  safe("quotes", renderQuotes);
  safe("moments", renderMoments);
  safe("creeds", renderCreeds);
  safe("stats", renderStats);
  safe("sources", renderSources);
  safe("words", renderWords);
  safe("curve", renderCurve);
  safe("rhythm", renderRhythm);
  safe("badges", renderBadges);
  safe("diagnosis", renderDiagnosis);
  safe("recommendations", renderRecommendations);
  safe("persona", renderPersona);
  safe("skills", renderSkills);
})();
</script>
